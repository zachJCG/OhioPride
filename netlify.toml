[build]
  publish = "."
  functions = "netlify/functions"

# Hourly ActBlue contribution sync. Reads ACTBLUE_* and SUPABASE_* env vars
# from the Netlify dashboard; fails gracefully when credentials are missing.
[functions."actblue-sync"]
  schedule = "@hourly"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# Internal, unlisted board retreat availability form. Never linked publicly.
[[headers]]
  for = "/board-retreat/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

