# Round-4 rebuild: this site is now a Next.js app. The original Netlify
# functions and the publish="." static-HTML config have been retired in
# favor of the official Next.js runtime. Both Vercel (primary) and Netlify
# (fallback / previews) build straight from this repo.
#
# All redirects, headers, and clean-URL rewrites that used to live here are
# now expressed in next.config.mjs so they work on either platform.

[build]
  command  = "npm run build"
  publish  = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
