<!doctype html>
<!--
  Module stub. Each /admin/<module>/index.html in this bundle uses the same
  template, swapping `data-active-nav`, `data-page-title`, `data-page-eyebrow`,
  and the empty-state copy. Wire real data in once the module is built.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />
    <link rel="stylesheet" href="/admin/admin-responsive.css" />
  </head>
  <body class="admin-shell">
    <div id="shell-root"
         data-active-nav="settings"
         data-page-eyebrow="Account"
         data-page-title="Settings"
         data-page-sub="Your profile, dashboard layout, and notification preferences."></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>
    <script>
      document.addEventListener('admin-shell-ready', function () {
        document.getElementById('shellBody').innerHTML =
          '<div class="shell-widget"><div class="shell-widget-empty">' +
            '<strong style="display:block;font-size:16px;color:#fff;margin-bottom:8px">Module coming soon</strong>' +
            'This admin module is reserved in the navigation and gated by your role. ' +
            'Wire it up by replacing the stub at <code>/admin/settings/index.html</code>.' +
          '</div></div>';
      });
    </script>
      <script src="/admin/admin-responsive.js" defer></script>
  </body>
</html>
