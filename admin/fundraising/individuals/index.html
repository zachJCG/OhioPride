<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAC Individuals | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />
    <link rel="stylesheet" href="/admin/admin-responsive.css" />
    <link rel="stylesheet" href="/admin/fundraising/fundraising.css" />
  </head>

  <body class="admin-shell" data-fund-side="pac">
    <div
      id="shell-root"
      data-active-nav="fundraising_individuals"
      data-page-eyebrow="Fundraising · Ohio Pride PAC"
      data-page-title="PAC Individuals"
      data-page-sub="Individual and committee major-donor prospects for the political committee."
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>
    <script src="/admin/fundraising/pipeline.js"></script>
    <script>
      window.FUND_PIPELINE.init({
        side: 'pac',
        module: 'pac_prospects',
        view: 'pac_pipeline',
        byStageView: 'pac_pipeline_by_stage',
        baseTable: 'pac_prospects',
        setStageRpc: 'pac_prospect_set_stage',
        // PAC-specific: split individuals vs committees.
        typeField: 'prospect_type',
        typeLabel: 'Type',
        typeOptions: [
          { value: 'individual', label: 'Individuals' },
          { value: 'committee', label: 'Committees' }
        ],
        defaultType: 'individual',
        wallTitle: 'Ohio Pride PAC — political committee',
        wallBody: 'PAC data is legally walled off from Ohio Pride Action (c4). Never combine the two.'
      });
    </script>
    <script src="/admin/admin-responsive.js" defer></script>
  </body>
</html>
