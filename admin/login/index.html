<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin Sign In | Ohio Pride PAC</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/admin/admin-shell.css" />

  <style>
    main.admin-main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .login-card-banner { height: 4px; background: var(--pride-gradient); }
    .login-body { padding: 40px 36px 36px; }
    .login-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--cyan);
      margin: 0 0 10px;
    }
    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 8px;
    }
    .login-subtitle {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 28px;
    }
    .field { margin-bottom: 18px; }
    .login-foot {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line-soft);
      font-size: 12px;
      color: var(--ink-mute);
      text-align: center;
    }
    .login-foot a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
    .login-foot a:hover { color: var(--navy); }
  </style>
</head>
<body>
  <main class="admin-main">
    <div class="login-card">
      <div class="login-card-banner" aria-hidden="true"></div>
      <div class="login-body">
        <p class="login-eyebrow">Restricted Access</p>
        <h1 class="login-title">Admin Sign In</h1>
        <p class="login-subtitle">Magic link only. Enter your authorized email and we will send a one-time sign in link.</p>

        <div class="alert alert-error" id="adminShellLoginError" role="alert"></div>
        <div class="alert alert-success" id="adminShellLoginSuccess" role="status">
          <strong>Check your email.</strong>
          <span id="adminShellLoginSuccessText">A sign in link has been sent.</span>
        </div>

        <form id="adminShellLoginForm" novalidate>
          <div class="field">
            <label class="label" for="adminShellLoginEmail">Email address</label>
            <input class="input" type="email" id="adminShellLoginEmail" name="email" required autocomplete="email" inputmode="email" placeholder="you@ohiopride.org" />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="adminShellLoginBtn">
            <span class="spinner" aria-hidden="true"></span>
            <span class="label">Send Magic Link</span>
          </button>
        </form>

        <div class="login-foot">
          Not authorized? <a href="/">Return to OhioPride.org</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/admin/admin-shell.js"></script>
  <script>
    window.AdminShell.mountLogin();
  </script>
</body>
</html>
