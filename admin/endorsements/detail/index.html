<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting&hellip; | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <script>
      // The standalone detail page has been folded into the main
      // /admin/endorsements console (it now opens in the shell drawer).
      // Preserve the ?id= deep link so old links and bookmarks keep working.
      (function () {
        var id = new URLSearchParams(window.location.search).get('id');
        var dest = '/admin/endorsements' + (id ? '?id=' + encodeURIComponent(id) : '');
        window.location.replace(dest);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/admin/endorsements">/admin/endorsements</a>&hellip;</p>
  </body>
</html>
