<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Application Detail | Ohio Pride PAC Admin</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/admin/endorsements/admin.css" />

  <style>
    main {
      flex: 1;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .crumb {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .crumb:hover { color: var(--ink); }
    .crumb::before { content: '\u2039 '; font-weight: 800; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: flex-start;
    }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static !important; }
    }

    /* ---- Main content ---- */
    .candidate-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .candidate-banner {
      height: 6px;
      background: var(--pride-gradient);
    }

    .cand-head {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--line-soft);
    }
    .cand-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cand-name .pronouns {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-mute);
      letter-spacing: 0;
      font-family: 'Roboto Slab', Georgia, serif;
    }
    .cand-meta {
      font-family: 'Roboto Slab', Georgia, serif;
      font-size: 14px;
      color: var(--ink-soft);
      margin: 0;
    }
    .cand-meta strong { color: var(--ink); font-weight: 600; }
    .cand-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .pill {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      background: var(--paper);
      color: var(--ink-soft);
      border-radius: 999px;
      border: 1px solid var(--line);
    }

    .section {
      padding: 28px 32px;
      border-bottom: 1px solid var(--line-soft);
    }
    .section:last-child { border-bottom: none; }
    .section-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin: 0 0 8px;
    }
    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 0 0 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px 24px;
    }
    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
    }
    .info-row .info-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: block;
      margin-bottom: 4px;
    }
    .info-row .info-value {
      font-size: 14px;
      color: var(--ink);
      word-break: break-word;
    }
    .info-row .info-value.muted { color: var(--ink-mute); font-style: italic; }
    .info-row a { color: var(--navy); text-decoration: underline; text-underline-offset: 2px; }
    .info-row a:hover { color: var(--cyan); }

    .position-block {
      background: var(--paper);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      border-left: 3px solid var(--line);
    }
    .position-block.yes { border-left-color: var(--success); }
    .position-block.no { border-left-color: var(--error); }
    .position-q {
      font-family: 'Roboto Slab', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--ink);
      margin: 0 0 12px;
    }
    .position-q .num {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      color: var(--cyan);
      margin-right: 6px;
    }
    .position-answer {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .position-answer.yes { background: var(--success-soft); color: var(--success); }
    .position-answer.no  { background: var(--error-soft); color: var(--error); }
    .position-answer.unanswered { background: var(--paper-2); color: var(--ink-mute); }
    .position-explain {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink-soft);
      white-space: pre-wrap;
      margin: 0;
    }
    .position-explain.empty { font-style: italic; color: var(--ink-mute); }

    .open-response {
      margin-bottom: 22px;
    }
    .open-response:last-child { margin-bottom: 0; }
    .open-response h3 {
      font-family: 'Roboto Slab', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .open-response p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink-soft);
      white-space: pre-wrap;
      margin: 0;
      padding: 14px 16px;
      background: var(--paper);
      border-radius: var(--radius);
      border-left: 3px solid var(--cyan);
    }
    .open-response p.empty { font-style: italic; color: var(--ink-mute); }

    .attest-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--success-soft);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--success);
      margin-top: 12px;
    }
    .attest-row.unattested {
      background: var(--error-soft);
      color: var(--error);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 24px;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .meta-grid strong {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--ink-soft);
      display: block;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .side-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px;
    }
    .side-card h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0 0 14px;
    }
    .side-card .field { margin-bottom: 14px; }
    .side-card .field:last-child { margin-bottom: 0; }
    .side-card .helper {
      font-size: 11px;
      color: var(--ink-mute);
      margin: 6px 0 0;
      line-height: 1.5;
    }
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pdf-link {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      text-align: center;
      padding: 8px;
      border: 1px dashed var(--cyan);
      border-radius: var(--radius);
      margin-top: 8px;
    }
    .pdf-link:hover { background: var(--cyan-soft); }

    .auth-blocker {
      max-width: 480px;
      margin: 80px auto;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .auth-blocker h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      margin: 0 0 12px;
    }
    .auth-blocker p { color: var(--ink-soft); margin: 0 0 24px; }

    @media (max-width: 600px) {
      main { padding: 16px 12px 36px; }
      .cand-head, .section { padding: 22px 20px; }
      .cand-name { font-size: 24px; }
    }
  </style>

  <link rel="stylesheet" href="/css/site-template.css">
</head>
<body>
<div id="site-header"></div>

  <div class="admin-subnav">
    <div class="admin-subnav-inner">
      <span class="admin-tag">Admin &middot; Endorsements</span>
      <div class="header-right">
        <span class="header-user" id="headerUser"></span>
        <button class="header-btn" id="btnSignOut">Sign Out</button>
      </div>
    </div>
  </div>

  <main>
    <div id="appShell" style="display:none;">
      <a href="/admin/endorsements" class="crumb">All applications</a>

      <div class="layout">
        <article class="candidate-card" id="candCard">
          <div class="candidate-banner" aria-hidden="true"></div>
          <div class="cand-head" id="candHead"></div>

          <section class="section" id="sectionContact"></section>
          <section class="section" id="sectionPositions"></section>
          <section class="section" id="sectionLegislative"></section>
          <section class="section" id="sectionVision"></section>
          <section class="section" id="sectionBackground"></section>
          <section class="section" id="sectionMeta"></section>
        </article>

        <aside class="sidebar">
          <div class="side-card">
            <h3>Status</h3>
            <div class="field">
              <select class="select" id="statusSelect">
                <option value="submitted">Submitted</option>
                <option value="under_review">Under Review</option>
                <option value="endorsed">Endorsed</option>
                <option value="declined">Declined</option>
                <option value="withdrawn">Withdrawn</option>
              </select>
              <p class="helper">Setting status to <strong>Endorsed</strong> publishes this candidate on the public endorsements page.</p>
            </div>
          </div>

          <div class="side-card">
            <h3>Reviewer Notes</h3>
            <div class="field">
              <textarea class="textarea" id="reviewerNotes" placeholder="Internal notes for the screening committee. Not shared with the candidate or public."></textarea>
            </div>
          </div>

          <div class="side-card">
            <h3>Actions</h3>
            <div class="btn-row">
              <button class="btn btn-primary" id="btnSave">
                <span class="spinner" aria-hidden="true"></span>
                <span class="label">Save Changes</span>
              </button>
              <button class="btn btn-cyan" id="btnPdf">
                <span class="spinner" aria-hidden="true"></span>
                <span class="label">Generate PDF</span>
              </button>
              <a href="#" class="pdf-link" id="pdfLink" style="display:none;">Open Last PDF</a>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <div class="auth-blocker" id="authBlocker" style="display:none;">
      <h2 id="authTitle">Checking access...</h2>
      <p id="authMsg">Verifying your session.</p>
      <a href="/admin/endorsements/login" class="btn btn-primary" id="authAction" style="display:none;">Sign In</a>
    </div>
  </main>

<div id="site-footer"></div>

  <script src="/js/ohiopride-data.js" defer></script>
  <script src="/js/site-template.js" defer></script>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ===================================================================
       CONFIG
       =================================================================== */
    const CONFIG = {
      SUPABASE_URL:      'https://dkdxefzhttkmjhdbkvqn.supabase.co',
      SUPABASE_ANON_KEY: '__PASTE_SUPABASE_ANON_KEY__',
      LOGIN_PATH:        '/admin/endorsements/login',
      LIST_PATH:         '/admin/endorsements',
      PDF_FUNCTION_PATH: '/.netlify/functions/generate-endorsement-pdf'
    };

    const STATUS_LABEL = {
      submitted: 'Submitted',
      under_review: 'Under Review',
      endorsed: 'Endorsed',
      declined: 'Declined',
      withdrawn: 'Withdrawn'
    };

    const $ = (s) => document.querySelector(s);

    const state = {
      app: null,
      session: null
    };

    const client = window.supabase.createClient(
      CONFIG.SUPABASE_URL,
      CONFIG.SUPABASE_ANON_KEY,
      { auth: { detectSessionInUrl: true, persistSession: true } }
    );

    /* ===================================================================
       Util
       =================================================================== */
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function fmtDateTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
    }
    function toast(msg, type) {
      const el = $('#toast');
      el.textContent = msg;
      el.className = 'toast visible' + (type ? ' toast-' + type : '');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('visible'), 3500);
    }
    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    function showBlocker(title, msg, action) {
      $('#appShell').style.display = 'none';
      $('#authBlocker').style.display = 'block';
      $('#authTitle').textContent = title;
      $('#authMsg').textContent = msg;
      const btn = $('#authAction');
      if (action) {
        btn.style.display = 'inline-flex';
        btn.textContent = action.label;
        btn.href = action.href;
      } else {
        btn.style.display = 'none';
      }
    }

    /* ===================================================================
       Auth
       =================================================================== */
    async function ensureAuthed() {
      await new Promise(r => setTimeout(r, 50));
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        window.location.replace(CONFIG.LOGIN_PATH);
        return null;
      }
      if (window.location.hash && window.location.hash.includes('access_token')) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
      state.session = session;

      const { data: allow, error } = await client
        .from('admin_emails')
        .select('email')
        .eq('email', session.user.email)
        .maybeSingle();
      if (error || !allow) {
        await client.auth.signOut();
        showBlocker(
          'Access denied',
          'Your email is not authorized for the admin dashboard.',
          { label: 'Sign in with a different email', href: CONFIG.LOGIN_PATH }
        );
        return null;
      }

      $('#headerUser').textContent = session.user.email;
      return session;
    }

    /* ===================================================================
       Render sections
       =================================================================== */
    function renderHead(a) {
      const pronouns = a.pronouns ? `<span class="pronouns">${escapeHtml(a.pronouns)}</span>` : '';
      const meta = [];
      if (a.office_sought) meta.push(`<strong>${escapeHtml(a.office_sought)}</strong>`);
      if (a.district)      meta.push(escapeHtml(a.district));
      if (a.election_year) meta.push(escapeHtml(a.election_year));

      const pills = [];
      if (a.party)   pills.push(`<span class="pill">${escapeHtml(a.party)}</span>`);
      if (a.is_out === 'yes') pills.push(`<span class="pill">Out as LGBTQ+</span>`);
      if (a.is_out === 'prefer_not_to_say') pills.push(`<span class="pill">Identity: Prefer not to say</span>`);

      $('#candHead').innerHTML = `
        <h1 class="cand-name">${escapeHtml(a.candidate_name)} ${pronouns}
          <span class="badge badge-${a.status}">${STATUS_LABEL[a.status] || a.status}</span>
        </h1>
        <p class="cand-meta">${meta.join(' &middot; ')}</p>
        ${pills.length ? `<div class="cand-pills">${pills.join('')}</div>` : ''}
      `;
    }

    function renderContact(a) {
      const rows = [
        ['Email',       a.email ? `<a href="mailto:${escapeHtml(a.email)}">${escapeHtml(a.email)}</a>` : null],
        ['Phone',       a.phone ? `<a href="tel:${escapeHtml(a.phone)}">${escapeHtml(a.phone)}</a>` : null],
        ['Website',     a.website ? `<a href="${escapeHtml(a.website)}" target="_blank" rel="noopener">${escapeHtml(a.website)}</a>` : null],
        ['Committee',   a.committee_name],
        ['Treasurer',   a.treasurer_name],
        ['District',    a.district],
        ['Election',    a.election_year]
      ];
      const html = rows.map(([label, value]) => {
        const v = value ? `<span class="info-value">${value}</span>`
                        : `<span class="info-value muted">Not provided</span>`;
        return `<div class="info-row"><span class="info-label">${label}</span>${v}</div>`;
      }).join('');
      $('#sectionContact').innerHTML = `
        <p class="section-eyebrow">Section 1 of 5</p>
        <h2 class="section-title">Candidate Information</h2>
        <div class="info-grid">${html}</div>
      `;
    }

    function renderPositions(a) {
      const positions = [
        ['Q1', 'Do you support statewide nondiscrimination protections for LGBTQ+ Ohioans in employment, housing, public accommodations, and healthcare (the Ohio Fairness Act)?', a.q1_nondiscrimination, a.q1_explanation],
        ['Q2', 'Do you oppose legislation restricting medically recommended gender-affirming care, or imposing broad bans on gender expression including drag performances (e.g., HB 249)?', a.q2_anti_lgbtq_legislation, a.q2_explanation],
        ['Q3', 'Do you support a statewide ban on so-called conversion therapy?', a.q3_conversion_therapy, a.q3_explanation],
        ['Q4', 'Do you support inclusive K-12 schools, including protections against bullying, opposition to forced outing policies, and access to accurate information about LGBTQ+ people and families?', a.q4_inclusive_education, a.q4_explanation],
        ['Q5', 'Will you vote against bills that roll back LGBTQ+ rights or create broad religious exemptions used to justify discrimination?', a.q5_vote_against_rollbacks, a.q5_explanation]
      ];

      const blocks = positions.map(([num, q, ans, exp]) => {
        const ansClass = ans === true ? 'yes' : ans === false ? 'no' : 'unanswered';
        const ansLabel = ans === true ? 'Yes' : ans === false ? 'No' : 'No answer';
        const expHtml = exp
          ? `<p class="position-explain">${escapeHtml(exp)}</p>`
          : `<p class="position-explain empty">No explanation provided.</p>`;
        return `
          <div class="position-block ${ansClass}">
            <p class="position-q"><span class="num">${num}.</span> ${escapeHtml(q)}</p>
            <span class="position-answer ${ansClass}">${ansLabel}</span>
            ${expHtml}
          </div>`;
      }).join('');

      $('#sectionPositions').innerHTML = `
        <p class="section-eyebrow">Section 2 of 5</p>
        <h2 class="section-title">Core Positions</h2>
        ${blocks}
      `;
    }

    function renderLegislative(a) {
      const items = [
        ['Top three pro-equality legislative or policy priorities', a.q6_priorities],
        ['Bills you would champion or co-sponsor',                  a.q7_legislation],
        ['How you will address threats to LGBTQ+ safety',           a.q8_safety]
      ];
      $('#sectionLegislative').innerHTML = `
        <p class="section-eyebrow">Section 3 of 5</p>
        <h2 class="section-title">Legislative and Advocacy Commitment</h2>
        ${items.map(([h, body]) => `
          <div class="open-response">
            <h3>${escapeHtml(h)}</h3>
            ${body
              ? `<p>${escapeHtml(body)}</p>`
              : `<p class="empty">No response provided.</p>`}
          </div>
        `).join('')}
      `;
    }

    function renderVision(a) {
      const items = [
        ['How LGBTQ+ equality connects to other priorities in your race', a.q9_intersection],
        ['Why you are seeking Ohio Pride\u2019s endorsement',             a.q10_why_endorsement]
      ];
      $('#sectionVision').innerHTML = `
        <p class="section-eyebrow">Section 4 of 5</p>
        <h2 class="section-title">Vision and Ohio Context</h2>
        ${items.map(([h, body]) => `
          <div class="open-response">
            <h3>${escapeHtml(h)}</h3>
            ${body
              ? `<p>${escapeHtml(body)}</p>`
              : `<p class="empty">No response provided.</p>`}
          </div>
        `).join('')}
      `;
    }

    function renderBackground(a) {
      const items = [
        ['Bio', a.bio],
        ['Conflicts disclosure', a.conflicts_disclosure]
      ];
      const blocks = items.map(([h, body]) => `
        <div class="open-response">
          <h3>${escapeHtml(h)}</h3>
          ${body
            ? `<p>${escapeHtml(body)}</p>`
            : `<p class="empty">No response provided.</p>`}
        </div>
      `).join('');

      const attest = a.attestation
        ? `<div class="attest-row"><strong>&#10003; Certified.</strong> Signed by ${escapeHtml(a.signature || 'unsigned')}.</div>`
        : `<div class="attest-row unattested">Not certified. Signature: ${escapeHtml(a.signature || 'none')}.</div>`;

      $('#sectionBackground').innerHTML = `
        <p class="section-eyebrow">Section 5 of 5</p>
        <h2 class="section-title">Background and Attestation</h2>
        ${blocks}
        ${attest}
      `;
    }

    function renderMeta(a) {
      $('#sectionMeta').innerHTML = `
        <p class="section-eyebrow">Submission Metadata</p>
        <h2 class="section-title">Audit Trail</h2>
        <div class="meta-grid">
          <div><strong>Application ID</strong>${escapeHtml(a.id)}</div>
          <div><strong>Submitted</strong>${fmtDateTime(a.created_at)}</div>
          <div><strong>Last updated</strong>${fmtDateTime(a.updated_at)}</div>
          <div><strong>User agent</strong>${escapeHtml(a.user_agent || 'Not captured')}</div>
        </div>
      `;
    }

    function renderSidebar(a) {
      $('#statusSelect').value = a.status;
      $('#reviewerNotes').value = a.reviewer_notes || '';
      const link = $('#pdfLink');
      if (a.generated_pdf_path) {
        link.style.display = 'block';
        link.dataset.path = a.generated_pdf_path;
      } else {
        link.style.display = 'none';
      }
    }

    /* ===================================================================
       Data
       =================================================================== */
    async function loadApplication(id) {
      const { data, error } = await client
        .from('endorsement_applications')
        .select('*')
        .eq('id', id)
        .maybeSingle();
      if (error) throw error;
      return data;
    }

    async function saveChanges() {
      const newStatus = $('#statusSelect').value;
      const notes = $('#reviewerNotes').value;
      const btn = $('#btnSave');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const { error } = await client
          .from('endorsement_applications')
          .update({ status: newStatus, reviewer_notes: notes })
          .eq('id', state.app.id);
        if (error) throw error;
        state.app.status = newStatus;
        state.app.reviewer_notes = notes;
        renderHead(state.app);
        toast('Changes saved.', 'success');
      } catch (err) {
        console.error(err);
        toast('Save failed: ' + (err.message || 'unknown error'), 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    async function generatePdf() {
      const btn = $('#btnPdf');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch(CONFIG.PDF_FUNCTION_PATH, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + state.session.access_token
          },
          body: JSON.stringify({ application_id: state.app.id })
        });
        if (res.status === 404) {
          toast('PDF generator not deployed yet. Coming in Phase 4.', 'error');
          return;
        }
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || ('HTTP ' + res.status));
        }
        const data = await res.json();
        toast('PDF generated.', 'success');
        if (data.signed_url) {
          window.open(data.signed_url, '_blank');
          $('#pdfLink').style.display = 'block';
          $('#pdfLink').href = data.signed_url;
        }
      } catch (err) {
        console.error(err);
        toast('PDF generation failed.', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    async function openExistingPdf(e) {
      e.preventDefault();
      const path = e.currentTarget.dataset.path;
      if (!path) return;
      try {
        const { data, error } = await client.storage
          .from('endorsement-pdfs')
          .createSignedUrl(path.replace(/^endorsement-pdfs\//, ''), 60 * 60 * 24);
        if (error) throw error;
        window.open(data.signedUrl, '_blank');
      } catch (err) {
        console.error(err);
        toast('Could not open PDF. Try regenerating.', 'error');
      }
    }

    /* ===================================================================
       Init
       =================================================================== */
    (async function init() {
      const session = await ensureAuthed();
      if (!session) return;

      const id = getIdFromUrl();
      if (!id) {
        showBlocker('No application selected', 'Return to the list and choose an application.',
          { label: 'Back to list', href: CONFIG.LIST_PATH });
        return;
      }

      try {
        const app = await loadApplication(id);
        if (!app) {
          showBlocker('Application not found', 'It may have been deleted, or the link is invalid.',
            { label: 'Back to list', href: CONFIG.LIST_PATH });
          return;
        }
        state.app = app;
        $('#appShell').style.display = 'block';
        renderHead(app);
        renderContact(app);
        renderPositions(app);
        renderLegislative(app);
        renderVision(app);
        renderBackground(app);
        renderMeta(app);
        renderSidebar(app);
      } catch (err) {
        console.error(err);
        showBlocker('Could not load application', err.message || 'An error occurred.',
          { label: 'Back to list', href: CONFIG.LIST_PATH });
        return;
      }

      $('#btnSave').addEventListener('click', saveChanges);
      $('#btnPdf').addEventListener('click', generatePdf);
      $('#pdfLink').addEventListener('click', openExistingPdf);
      $('#btnSignOut').addEventListener('click', async () => {
        await client.auth.signOut();
        window.location.replace(CONFIG.LOGIN_PATH);
      });
    })();
  </script>
</body>
</html>
