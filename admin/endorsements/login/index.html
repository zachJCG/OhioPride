<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin Sign In | Ohio Pride PAC</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
  <meta name="theme-color" content="#0F2233" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/admin/endorsements/admin.css" />

  <style>
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .login-card-banner { height: 4px; background: var(--pride-gradient); }
    .login-body { padding: 40px 36px 36px; }
    .login-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--cyan);
      margin: 0 0 10px;
    }
    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 8px;
    }
    .login-subtitle {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 28px;
    }
    .field { margin-bottom: 18px; }
    .alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-error {
      background: var(--error-soft);
      border: 1.5px solid var(--error);
      color: var(--error);
    }
    .alert-success {
      background: var(--success-soft);
      border: 1.5px solid rgba(31,122,77,0.3);
      color: var(--success);
    }
    .alert-success strong { display: block; font-weight: 700; margin-bottom: 4px; }
    .login-foot {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line-soft);
      font-size: 12px;
      color: var(--ink-mute);
      text-align: center;
    }
    .login-foot a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
    .login-foot a:hover { color: var(--navy); }
    .btn-block { display: flex; width: 100%; }
  </style>
</head>
<body>
  <div class="pride-stripe-top" aria-hidden="true"></div>

  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-brand">
        <a href="/" class="ohp-wordmark admin-wordmark" aria-label="Ohio Pride PAC home">
          <span class="ohp-wordmark__ohio">Ohio</span><span class="ohp-wordmark__pride">Pride</span><span class="ohp-wordmark__pac">PAC</span>
        </a>
        <span class="admin-tag">Admin</span>
      </div>
    </div>
  </header>

  <main>
    <div class="login-card">
      <div class="login-card-banner" aria-hidden="true"></div>
      <div class="login-body">
        <p class="login-eyebrow">Restricted Access</p>
        <h1 class="login-title">Admin Sign In</h1>
        <p class="login-subtitle">Sign in with your authorized Ohio Pride board email and password.</p>

        <div class="alert alert-error" id="alertError" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label class="label" for="email">Email address</label>
            <input class="input" type="email" id="email" name="email" required autocomplete="email" inputmode="email" placeholder="you@ohiopride.org" />
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" type="password" id="password" name="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="btnSubmit">
            <span class="spinner" aria-hidden="true"></span>
            <span class="label">Sign In</span>
          </button>
        </form>

        <div class="login-foot">
          Forgot your password? Contact <a href="mailto:zach@ohiopride.org">zach@ohiopride.org</a> for a reset.
        </div>
      </div>
    </div>
  </main>

  <footer class="admin-footer">
    <p class="disclaimer">Paid for by Ohio Pride PAC. Zachary R. Joseph, Director.</p>
  </footer>

  <div class="pride-stripe-bottom" aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ===================================================================
       CONFIG
       =================================================================== */
    const CONFIG = {
      SUPABASE_URL:      'https://dkdxefzhttkmjhdbkvqn.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrZHhlZnpodHRrbWpoZGJrdnFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTk5NjksImV4cCI6MjA5MjM5NTk2OX0.l6wUMIdUX5Es4Jvh8fRTvnlYrMQKzYy_NEGBFJ1iMj4',
      LIST_PATH:         '/admin/endorsements'
    };

    const $ = (s) => document.querySelector(s);

    function showError(msg) {
      const el = $('#alertError');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError() {
      $('#alertError').classList.remove('visible');
    }

    const client = window.supabase.createClient(
      CONFIG.SUPABASE_URL,
      CONFIG.SUPABASE_ANON_KEY,
      { auth: { detectSessionInUrl: false, persistSession: true } }
    );

    /* ===================================================================
       Auto-redirect if already signed in
       =================================================================== */
    (async function checkExistingSession() {
      try {
        const { data: { session } } = await client.auth.getSession();
        if (session) {
          window.location.replace(CONFIG.LIST_PATH);
        }
      } catch (_) { /* no-op */ }
    })();

    /* ===================================================================
       Submit handler
       =================================================================== */
    $('#loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('#btnSubmit');
      const email = $('#email').value.trim().toLowerCase();
      const password = $('#password').value;
      if (!email || !password) {
        showError('Enter your email and password.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      clearError();

      try {
        const { error: signInError } = await client.auth.signInWithPassword({ email, password });
        if (signInError) {
          showError('Invalid email or password. Contact zach@ohiopride.org if you need access.');
          return;
        }

        const { data: row, error: lookupError } = await client
          .from('admin_emails')
          .select('email')
          .eq('email', email)
          .maybeSingle();

        if (lookupError || !row) {
          await client.auth.signOut();
          showError('Your account does not have board access. Contact zach@ohiopride.org.');
          return;
        }

        window.location.replace(CONFIG.LIST_PATH);
      } catch (err) {
        console.error('Sign in error:', err);
        showError('Could not sign in. Please try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
