<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prospects | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />
    <link rel="stylesheet" href="/admin/admin-responsive.css" />

    <style>
      /* Local enhancements layered on top of admin-shared.css.
         Brand v2.0 (May 2026): Navy #152233, Light Blue #70D6EC. The Pride
         gradient is an accent only — a thin top bar — never behind text or pills. */

      .prospect-gradient-bar {
        height: 3px;
        border-radius: 999px;
        margin: 0 0 20px;
        background: linear-gradient(90deg,#E40303,#FFBC00,#FFED00,#008026,#004DFF,#750787);
      }

      /* ---- Summary strip (clickable stage chips, doubles as stage filter) ---- */
      .prospect-summary {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 2px 0 10px;
        margin-bottom: 18px;
        -webkit-overflow-scrolling: touch;
      }
      .prospect-chip {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 104px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border-light);
        background: rgba(15, 34, 51, 0.6);
        cursor: pointer;
        text-align: left;
        font-family: "Montserrat", sans-serif;
        transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      }
      .prospect-chip:hover { transform: translateY(-1px); }
      .prospect-chip.is-on {
        border-color: var(--text-accent);
        box-shadow: 0 0 0 2px rgba(112, 214, 236, 0.25);
      }
      .prospect-chip-top {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .prospect-chip-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .prospect-chip-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        white-space: nowrap;
      }
      .prospect-chip-count {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--text-white);
      }
      .prospect-chip-money {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-accent);
        font-variant-numeric: tabular-nums;
      }

      /* ---- Stage pill (solid color per stage, never the gradient) ---- */
      .prospect-stage-pill {
        display: inline-flex;
        align-items: center;
        font-family: "Montserrat", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 999px;
        color: #fff;
        white-space: nowrap;
      }
      .prospect-num-badge {
        display: inline-flex;
        align-items: center;
        margin-left: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(0, 128, 38, 0.18);
        color: #5bd98a;
      }

      .prospect-toolbar-toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 14px;
        font-family: "Montserrat", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text-light);
        background: rgba(15, 34, 51, 0.6);
        border: 1px solid var(--border-medium);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .prospect-toolbar-toggle.is-on {
        color: var(--text-accent);
        border-color: var(--text-accent);
        background: rgba(112, 214, 236, 0.12);
      }

      .prospect-tags { display: flex; flex-wrap: wrap; gap: 4px; }

      table.admin-table td.prospect-cell-next { white-space: normal; min-width: 150px; }
      table.admin-table tbody tr.prospect-row { cursor: pointer; }
      table.admin-table tbody tr.prospect-row:hover { background: rgba(112, 214, 236, 0.06); }

      /* ---- Pagination ---- */
      .prospect-pager {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 16px;
        font-family: "Montserrat", sans-serif;
        font-size: 12px;
        color: var(--text-muted);
      }
      .prospect-pager button {
        font-family: "Montserrat", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        padding: 7px 12px;
        border-radius: 6px;
        border: 1px solid var(--border-medium);
        background: rgba(15, 34, 51, 0.6);
        color: var(--text-light);
        cursor: pointer;
      }
      .prospect-pager button:disabled { opacity: 0.4; cursor: default; }

      /* ---- Drawer form bits (mirrors volunteers module) ---- */
      .prospect-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
      .prospect-form-grid label {
        display: flex; flex-direction: column; gap: 4px;
        font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55); font-family: "Montserrat", sans-serif;
      }
      .prospect-form-grid label.span-2 { grid-column: 1 / -1; }
      .prospect-form-grid input.admin-input,
      .prospect-form-grid select.admin-input,
      .prospect-form-grid textarea.admin-input {
        width: 100%; min-width: 0; font-family: "Roboto Slab", Georgia, serif;
        font-size: 14px; text-transform: none; letter-spacing: 0; color: var(--text-white);
      }
      .prospect-form-grid textarea.admin-input { min-height: 70px; resize: vertical; }
      .prospect-readonly-note {
        font-size: 12px; color: var(--text-muted); font-style: italic;
        margin: 2px 0 10px; display: flex; align-items: center; gap: 6px;
      }
      .prospect-managed {
        font-size: 14px; color: rgba(255, 255, 255, 0.85);
        padding: 8px 10px; border-radius: 6px; background: rgba(15, 34, 51, 0.6);
        border: 1px dashed var(--border-medium);
      }
      .prospect-bool-row { display: flex; flex-wrap: wrap; gap: 14px 24px; padding-top: 4px; }
      .prospect-bool-row label {
        display: inline-flex; align-items: center; gap: 8px;
        font-family: "Roboto Slab", Georgia, serif; font-size: 13px; color: rgba(255, 255, 255, 0.85);
      }
      .prospect-bool-row input[type="checkbox"] { accent-color: #70D6EC; width: 15px; height: 15px; }

      /* ---- Activity timeline ---- */
      .prospect-timeline { list-style: none; margin: 12px 0 0; padding: 0; }
      .prospect-act {
        position: relative;
        padding: 0 0 16px 26px;
        border-left: 2px solid rgba(255, 255, 255, 0.1);
        margin-left: 6px;
      }
      .prospect-act:last-child { border-left-color: transparent; padding-bottom: 0; }
      .prospect-act-icon {
        position: absolute; left: -11px; top: 0;
        width: 20px; height: 20px; border-radius: 50%;
        background: #0e2237; border: 2px solid var(--text-accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; color: var(--text-accent);
      }
      .prospect-act-subject { font-size: 14px; font-weight: 600; color: var(--text-white); }
      .prospect-act-body { font-size: 13px; color: rgba(255, 255, 255, 0.8); white-space: pre-wrap; margin-top: 2px; }
      .prospect-act-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
      .prospect-act-type {
        text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700;
        font-family: "Montserrat", sans-serif;
      }

      @media (max-width: 600px) {
        .prospect-form-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>

  <body class="admin-shell">
    <div
      id="shell-root"
      data-active-nav="prospects"
      data-page-eyebrow="People"
      data-page-title="Donor Pipeline"
      data-page-sub="Cultivate, track, and steward major-donor prospects."
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>

    <script>
      (function () {
        'use strict';

        var PAGE_SIZE = 50;
        var COLSPAN = 6;

        // Stage vocabulary, ordered identified -> ... -> declined (spec §4.1).
        var STAGES = ['identified','qualified','cultivating','ask_made','committed','secured','stewardship','lapsed','declined'];
        var STAGE_LABEL = {
          identified:'Identified', qualified:'Qualified', cultivating:'Cultivating',
          ask_made:'Ask Made', committed:'Committed', secured:'Secured',
          stewardship:'Stewardship', lapsed:'Lapsed', declined:'Declined'
        };
        // Solid colors per brand §5 (refined for contrast; light pills get navy text).
        var STAGE_COLOR = {
          identified:'#64748B', qualified:'#234A66', cultivating:'#1A3A52',
          ask_made:'#C2740A', committed:'#9A6700', secured:'#008026',
          stewardship:'#066B23', lapsed:'#9CA3AF', declined:'#9B2C2C'
        };
        var STAGE_TEXT = { lapsed:'#152233' }; // navy text on the light grey pill

        var STATUS_OPTIONS = ['active','on_hold','archived'];
        var STATUS_LABEL = { active:'Active', on_hold:'On hold', archived:'Archived' };
        var PRIORITY_OPTIONS = ['high','medium','low'];
        var PRIORITY_LABEL = { high:'High', medium:'Medium', low:'Low' };
        var SOURCE_OPTIONS = ['manual','founding_member','donor','volunteer','event','referral','website','import','other'];
        var SOURCE_LABEL = {
          manual:'Manual', founding_member:'Founding member', donor:'Donor', volunteer:'Volunteer',
          event:'Event', referral:'Referral', website:'Website', import:'Import', other:'Other'
        };
        var ACTIVITY_TYPES = ['note','call','email','text','meeting','event','ask','pledge','gift','stage_change','system'];
        var ACTIVITY_LABEL = {
          note:'Note', call:'Call', email:'Email', text:'Text', meeting:'Meeting', event:'Event',
          ask:'Ask', pledge:'Pledge', gift:'Gift', stage_change:'Stage change', system:'System'
        };
        var ACTIVITY_ICON = {
          note:'✎', call:'☎', email:'✉', text:'\u{1F4AC}', meeting:'\u{1F465}',
          event:'⚑', ask:'\u{1F4B0}', pledge:'\u{1F91D}', gift:'✓',
          stage_change:'⇄', system:'⚙'
        };
        // Contact-type activities bump last_contacted_at (DB trigger handles it).
        var CONTACT_TYPES = ['call','email','text','meeting','event'];
        // Identity fields owned by Founding Members on secured rows (read-only here).
        var SECURED_READONLY = ['full_name','email','city','county','state'];

        var state = {
          client: null,
          canWrite: false,
          // filters
          search: '',
          stageFilter: [],
          ownerId: '',
          source: '',
          county: '',
          priority: '',
          dnc: '',            // '', 'only', 'hide'
          followups: false,
          showSecured: false,
          // sort + page
          sortKey: 'next_action_date',
          sortDir: 'asc',
          page: 0,
          total: 0,
          rows: [],
          // lookups
          adminUsers: [],
          adminUserById: {},
          securedCount: 0,
          // drawer
          activeId: null,
          activeRow: null
        };

        function $(id) { return document.getElementById(id); }

        // ---------------------------------------------------------------
        // Formatting helpers (spec §6)
        // ---------------------------------------------------------------
        function money(cents) {
          if (cents == null) return '';
          return new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD',
            minimumFractionDigits: cents % 100 ? 2 : 0
          }).format(cents / 100);
        }
        function dollarsToCents(input) {
          var v = String(input == null ? '' : input).replace(/[$,\s]/g, '').trim();
          if (!v) return null;
          var n = parseFloat(v);
          return isNaN(n) ? null : Math.round(n * 100);
        }
        function centsToInput(cents) {
          if (cents == null) return '';
          return (cents / 100).toFixed(cents % 100 ? 2 : 0);
        }
        function fmtDate(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        function fmtDateTime(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
          });
        }
        function relTime(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          var secs = Math.round((Date.now() - d.getTime()) / 1000);
          if (secs < 60) return 'just now';
          var mins = Math.round(secs / 60);
          if (mins < 60) return mins + 'm ago';
          var hrs = Math.round(mins / 60);
          if (hrs < 24) return hrs + 'h ago';
          var days = Math.round(hrs / 24);
          if (days < 30) return days + 'd ago';
          return fmtDate(iso);
        }
        function todayISO() {
          var d = new Date();
          var m = String(d.getMonth() + 1).padStart(2, '0');
          var day = String(d.getDate()).padStart(2, '0');
          return d.getFullYear() + '-' + m + '-' + day;
        }
        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
          });
        }
        function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
        function toast(msg, kind) {
          if (window.AdminShell && window.AdminShell.toast) window.AdminShell.toast(msg, kind);
        }

        function stagePill(stage) {
          var bg = STAGE_COLOR[stage] || '#64748B';
          var fg = STAGE_TEXT[stage] || '#fff';
          return '<span class="prospect-stage-pill" style="background:' + bg + ';color:' + fg + '">' +
            escapeHtml(STAGE_LABEL[stage] || stage) + '</span>';
        }
        function isSecured(r) {
          return !!(r && (r.founding_member_id || r.source === 'founding_member'));
        }

        // ---------------------------------------------------------------
        // Boot
        // ---------------------------------------------------------------
        document.addEventListener('admin-shell-ready', function (ev) {
          var detail = ev.detail || {};
          state.client = detail.client;

          // Gate the page on the server-side permission (spec §3 / §6).
          Promise.all([
            state.client.rpc('has_permission', { p_module: 'prospects', p_action: 'read'  }),
            state.client.rpc('has_permission', { p_module: 'prospects', p_action: 'write' })
          ]).then(function (res) {
            var canRead  = res[0] && res[0].data === true;
            state.canWrite = res[1] && res[1].data === true;

            if (!canRead) {
              renderDenied();
              return;
            }
            renderShell();
            bindEvents();

            // Load lookups + first page + summary in parallel.
            Promise.all([loadAdminUsers(), loadCounties()]).then(function () {
              populateOwnerFilter();
              loadSummary();
              loadList();
            });
          }).catch(function (err) {
            console.error('prospects gate failed', err);
            renderDenied();
          });
        });

        function renderDenied() {
          $('shellBody').innerHTML =
            '<div class="admin-panel"><div class="admin-panel-empty">' +
              '<div class="admin-panel-empty-eyebrow">Restricted</div>' +
              '<h2>You don’t have access to the donor pipeline</h2>' +
              '<p>The <code>prospects</code> module is limited to board members, the treasurer, and admins. ' +
              'Ask the Director if you need access.</p>' +
            '</div></div>';
        }

        function renderShell() {
          if (state.canWrite) {
            $('shellPageActions').innerHTML =
              '<button type="button" class="shell-btn shell-btn-primary" id="addProspectBtn">Add prospect</button>';
          }
          $('shellBody').innerHTML = pageHtml();
        }

        function pageHtml() {
          var ownerOpts = '<option value="">All owners</option><option value="__unassigned__">Unassigned</option>';
          var sourceOpts = '<option value="">All sources</option>' + SOURCE_OPTIONS.map(function (s) {
            return '<option value="' + s + '">' + SOURCE_LABEL[s] + '</option>';
          }).join('');
          var prioOpts = '<option value="">All priorities</option>' + PRIORITY_OPTIONS.map(function (p) {
            return '<option value="' + p + '">' + PRIORITY_LABEL[p] + '</option>';
          }).join('');

          return [
            '<div class="prospect-gradient-bar" aria-hidden="true"></div>',

            '<div class="prospect-summary" id="summaryStrip" aria-label="Pipeline by stage">',
              '<div class="admin-muted" style="padding:8px 4px">Loading pipeline…</div>',
            '</div>',

            '<div class="admin-toolbar">',
              '<input type="search" class="admin-input" id="filterSearch" placeholder="Search name or email…" autocomplete="off" />',
              '<select class="admin-input" id="filterOwner">' + ownerOpts + '</select>',
              '<select class="admin-input" id="filterSource">' + sourceOpts + '</select>',
              '<select class="admin-input" id="filterCounty"><option value="">All counties</option></select>',
              '<select class="admin-input" id="filterPriority">' + prioOpts + '</select>',
              '<select class="admin-input" id="filterDnc">',
                '<option value="">Any contact status</option>',
                '<option value="hide">Hide do-not-contact</option>',
                '<option value="only">Do-not-contact only</option>',
              '</select>',
              '<button type="button" class="prospect-toolbar-toggle" id="toggleFollowups">Follow-ups due</button>',
              '<button type="button" class="prospect-toolbar-toggle" id="toggleSecured">Show secured</button>',
              '<span class="admin-toolbar-spacer"></span>',
              '<span class="admin-result-count" id="resultCount"></span>',
            '</div>',

            '<div class="admin-table-wrap">',
              '<table class="admin-table" id="prospectsTable" data-stack-mobile="true">',
                '<thead><tr>',
                  '<th data-sort="full_name" class="admin-sortable">Name<span class="admin-sort-arrow">&darr;</span></th>',
                  '<th>Stage</th>',
                  '<th>Owner</th>',
                  '<th>Next action</th>',
                  '<th class="admin-num">Dollars</th>',
                  '<th data-sort="last_activity_at" class="admin-sortable">Last activity<span class="admin-sort-arrow">&darr;</span></th>',
                '</tr></thead>',
                '<tbody id="prospectsBody"><tr><td colspan="' + COLSPAN + '" class="admin-empty-row">Loading prospects…</td></tr></tbody>',
              '</table>',
            '</div>',

            '<div class="prospect-pager" id="pager"></div>',

            '<p class="admin-panel-foot">',
              'Secured donors mirror <code>founding_members</code> automatically (identity + gift managed there). ',
              'The CRM owns stage, ownership, tasks, tags, and the activity log. ',
              'Net-new lists import via <code>scripts/import_prospects.py</code>.',
            '</p>'
          ].join('');
        }

        // ---------------------------------------------------------------
        // Lookups
        // ---------------------------------------------------------------
        function loadAdminUsers() {
          return state.client
            .from('admin_users')
            .select('id, email, full_name, is_active')
            .eq('is_active', true)
            .order('full_name', { ascending: true })
            .then(function (resp) {
              if (resp.error) { console.warn('admin_users load failed', resp.error); return; }
              state.adminUsers = resp.data || [];
              state.adminUserById = {};
              state.adminUsers.forEach(function (u) { state.adminUserById[u.id] = u; });
            });
        }

        function loadCounties() {
          // Distinct counties for the filter. The full set is small (mirrors
          // founding members + manual adds), so a bounded select is cheap.
          return state.client
            .from('prospects')
            .select('county')
            .not('county', 'is', null)
            .limit(2000)
            .then(function (resp) {
              if (resp.error) { console.warn('county load failed', resp.error); return; }
              var seen = Object.create(null);
              (resp.data || []).forEach(function (r) {
                var c = (r.county || '').trim();
                if (c) seen[c] = true;
              });
              state._counties = Object.keys(seen).sort();
            });
        }

        function populateOwnerFilter() {
          var sel = $('filterOwner');
          if (!sel) return;
          state.adminUsers.forEach(function (u) {
            var opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = u.full_name || u.email;
            sel.appendChild(opt);
          });
          var cSel = $('filterCounty');
          (state._counties || []).forEach(function (c) {
            var opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            cSel.appendChild(opt);
          });
        }

        // ---------------------------------------------------------------
        // Summary strip (prospects_pipeline_summary)
        // ---------------------------------------------------------------
        function loadSummary() {
          state.client.from('prospects_pipeline_summary').select('*').then(function (resp) {
            if (resp.error) { console.warn('summary load failed', resp.error); $('summaryStrip').innerHTML = ''; return; }
            var byStage = {};
            (resp.data || []).forEach(function (r) { byStage[r.stage] = r; });
            state.securedCount = Number((byStage.secured && byStage.secured.prospect_count) || 0);
            renderSummary(byStage);
            // The list loads in parallel with the summary, so an empty table may
            // have rendered before we knew the secured count. Re-render the
            // empty state now that we do, so the "show secured" hint can appear.
            if (state.rows && state.rows.length === 0) renderRows();
          });
        }

        function renderSummary(byStage) {
          var strip = $('summaryStrip');
          var html = STAGES.map(function (stage) {
            var row = byStage[stage] || { prospect_count: 0, committed_cents: 0, secured_cents: 0 };
            var count = Number(row.prospect_count || 0);
            var moneyCents = stage === 'secured'
              ? Number(row.secured_cents || 0)
              : Number(row.committed_cents || 0);
            var moneyHtml = moneyCents > 0
              ? '<span class="prospect-chip-money">' + money(moneyCents) + '</span>'
              : '<span class="prospect-chip-money">&nbsp;</span>';
            var on = state.stageFilter.indexOf(stage) !== -1;
            return '<button type="button" class="prospect-chip' + (on ? ' is-on' : '') + '" data-stage="' + stage + '" ' +
                'aria-pressed="' + (on ? 'true' : 'false') + '">' +
              '<span class="prospect-chip-top">' +
                '<span class="prospect-chip-dot" style="background:' + (STAGE_COLOR[stage] || '#64748B') + '"></span>' +
                '<span class="prospect-chip-label">' + escapeHtml(STAGE_LABEL[stage]) + '</span>' +
              '</span>' +
              '<span class="prospect-chip-count">' + count.toLocaleString() + '</span>' +
              moneyHtml +
            '</button>';
          }).join('');
          strip.innerHTML = html;
        }

        // ---------------------------------------------------------------
        // List (prospects_pipeline, server-side filter + paginate)
        // ---------------------------------------------------------------
        function buildQuery(forCount) {
          var q = state.client.from('prospects_pipeline').select('*', { count: 'exact' });

          // Explicit stage selection overrides the "show secured" toggle.
          if (state.stageFilter.length) {
            q = q.in('stage', state.stageFilter);
          } else if (!state.showSecured) {
            q = q.neq('stage', 'secured');
          }

          if (state.search) {
            var s = state.search.replace(/[%,()]/g, ' ').trim();
            if (s) q = q.or('full_name.ilike.%' + s + '%,email.ilike.%' + s + '%');
          }
          if (state.ownerId === '__unassigned__') q = q.is('owner_id', null);
          else if (state.ownerId) q = q.eq('owner_id', state.ownerId);
          if (state.source) q = q.eq('source', state.source);
          if (state.county) q = q.eq('county', state.county);
          if (state.priority) q = q.eq('priority', state.priority);
          if (state.dnc === 'only') q = q.eq('do_not_contact', true);
          else if (state.dnc === 'hide') q = q.eq('do_not_contact', false);
          if (state.followups) q = q.not('next_action_date', 'is', null).lte('next_action_date', todayISO());

          // Sort
          if (state.sortKey === 'full_name') {
            q = q.order('full_name', { ascending: state.sortDir === 'asc' });
          } else if (state.sortKey === 'last_activity_at') {
            q = q.order('last_activity_at', { ascending: state.sortDir === 'asc', nullsFirst: false });
          } else {
            q = q.order('next_action_date', { ascending: true, nullsFirst: false })
                 .order('updated_at', { ascending: false });
          }

          var from = state.page * PAGE_SIZE;
          return q.range(from, from + PAGE_SIZE - 1);
        }

        function loadList() {
          buildQuery().then(function (resp) {
            if (resp.error) {
              console.error('prospects list failed', resp.error);
              $('prospectsBody').innerHTML =
                '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row admin-error">' +
                'Could not load prospects. Your role may not include this module.' +
                '</td></tr>';
              toast('Could not load prospects.', 'error');
              return;
            }
            state.rows = resp.data || [];
            state.total = resp.count == null ? state.rows.length : resp.count;
            renderRows();
            renderPager();
          });
        }

        // Are any narrowing filters active beyond the default secured-hidden view?
        function hasActiveFilters() {
          return !!(state.search || state.stageFilter.length || state.ownerId ||
            state.source || state.county || state.priority || state.dnc || state.followups);
        }

        // Context-aware empty message. The common "looks broken" case is a fresh
        // pipeline where every prospect is a secured founding member: those are
        // hidden by default, so the table is empty even though the Secured chip
        // shows a count. Guide the user to reveal them instead of dead-ending.
        function emptyStateHtml() {
          if (!hasActiveFilters() && !state.showSecured && state.securedCount > 0) {
            return 'No active prospects yet. ' +
              '<strong>' + state.securedCount.toLocaleString() + '</strong> secured ' +
              (state.securedCount === 1 ? 'donor is' : 'donors are') + ' hidden from this view. ' +
              '<button type="button" class="shell-btn shell-btn-outline" id="emptyShowSecured" ' +
              'style="margin-left:8px">Show secured donors</button>';
          }
          if (hasActiveFilters()) {
            return 'No prospects match these filters.';
          }
          return 'No prospects yet. Add one, or import a list via <code>scripts/import_prospects.py</code>.';
        }

        function renderRows() {
          var body = $('prospectsBody');
          var totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
          $('resultCount').textContent = state.total.toLocaleString() + (state.total === 1 ? ' prospect' : ' prospects');

          if (state.rows.length === 0) {
            body.innerHTML =
              '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row">' + emptyStateHtml() + '</td></tr>';
            var showBtn = $('emptyShowSecured');
            if (showBtn) {
              showBtn.addEventListener('click', function () {
                state.showSecured = true;
                var toggle = $('toggleSecured');
                if (toggle) toggle.classList.add('is-on');
                state.page = 0; loadList();
              });
            }
            return;
          }

          var html = '';
          state.rows.forEach(function (r) {
            var secured = isSecured(r);
            var name = escapeHtml(r.full_name || '—');
            var badge = (secured && r.founding_number)
              ? '<span class="prospect-num-badge" title="Founding member #' + r.founding_number + '">#' + escapeHtml(r.founding_number) + '</span>'
              : '';
            var sub = [];
            if (r.email) sub.push(escapeHtml(r.email));
            if (r.county) sub.push(escapeHtml(r.county) + (/(County|Co\.)$/i.test(r.county) ? '' : ' Co.'));
            var subHtml = sub.length ? '<span class="admin-cell-sub">' + sub.join(' · ') + '</span>' : '';

            var owner = r.owner_name
              ? escapeHtml(r.owner_name)
              : '<span class="admin-muted">Unassigned</span>';

            var nextHtml;
            if (r.next_action || r.next_action_date) {
              var overdue = r.next_action_date && r.next_action_date <= todayISO();
              nextHtml = (r.next_action ? escapeHtml(r.next_action) : '<span class="admin-muted">—</span>');
              if (r.next_action_date) {
                nextHtml += '<span class="admin-cell-sub"' + (overdue ? ' style="color:#ffc857"' : '') + '>' +
                  (overdue ? 'Due ' : '') + escapeHtml(fmtDate(r.next_action_date)) + '</span>';
              }
            } else {
              nextHtml = '<span class="admin-muted">—</span>';
            }

            var dollars;
            if (secured && r.secured_amount_cents != null) {
              dollars = money(r.secured_amount_cents);
              if (r.secured_recurrence === 'monthly') dollars += '<span class="admin-cell-sub">/mo</span>';
            } else if (r.committed_amount_cents) {
              dollars = money(r.committed_amount_cents);
              dollars += '<span class="admin-cell-sub">committed</span>';
            } else if (r.ask_target_cents) {
              dollars = '<span class="admin-muted">' + money(r.ask_target_cents) + '</span>';
              dollars += '<span class="admin-cell-sub">ask target</span>';
            } else {
              dollars = '<span class="admin-muted">—</span>';
            }

            var lastAct = r.last_activity_at
              ? escapeHtml(relTime(r.last_activity_at))
              : '<span class="admin-muted">—</span>';

            html +=
              '<tr class="prospect-row" data-id="' + escapeAttr(r.id) + '">' +
                '<td class="admin-cell-name" data-label="Name">' + name + badge + subHtml + '</td>' +
                '<td data-label="Stage">' + stagePill(r.stage) + '</td>' +
                '<td data-label="Owner">' + owner + '</td>' +
                '<td class="prospect-cell-next" data-label="Next action">' + nextHtml + '</td>' +
                '<td class="admin-num" data-label="Dollars">' + dollars + '</td>' +
                '<td data-label="Last activity">' + lastAct + '</td>' +
              '</tr>';
          });
          body.innerHTML = html;
        }

        function renderPager() {
          var pager = $('pager');
          var totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
          if (state.total <= PAGE_SIZE) { pager.innerHTML = ''; return; }
          var from = state.page * PAGE_SIZE + 1;
          var to = Math.min(state.total, (state.page + 1) * PAGE_SIZE);
          pager.innerHTML =
            '<span>' + from + '–' + to + ' of ' + state.total.toLocaleString() + '</span>' +
            '<button type="button" id="pagerPrev"' + (state.page === 0 ? ' disabled' : '') + '>Prev</button>' +
            '<button type="button" id="pagerNext"' + (state.page + 1 >= totalPages ? ' disabled' : '') + '>Next</button>';
          var prev = $('pagerPrev'), next = $('pagerNext');
          if (prev) prev.addEventListener('click', function () { if (state.page > 0) { state.page--; loadList(); } });
          if (next) next.addEventListener('click', function () {
            if (state.page + 1 < totalPages) { state.page++; loadList(); }
          });
        }

        function refreshAfterChange() {
          // Re-pull the list + summary so counts/dollars stay live.
          loadSummary();
          loadList();
        }

        // ---------------------------------------------------------------
        // Events
        // ---------------------------------------------------------------
        function bindEvents() {
          var debT;
          $('filterSearch').addEventListener('input', function () {
            clearTimeout(debT);
            debT = setTimeout(function () {
              state.search = $('filterSearch').value.trim();
              state.page = 0; loadList();
            }, 200);
          });
          ['filterOwner','filterSource','filterCounty','filterPriority','filterDnc'].forEach(function (id) {
            $(id).addEventListener('change', function () {
              state.ownerId  = $('filterOwner').value;
              state.source   = $('filterSource').value;
              state.county   = $('filterCounty').value;
              state.priority = $('filterPriority').value;
              state.dnc      = $('filterDnc').value;
              state.page = 0; loadList();
            });
          });
          $('toggleFollowups').addEventListener('click', function () {
            state.followups = !state.followups;
            this.classList.toggle('is-on', state.followups);
            state.page = 0; loadList();
          });
          $('toggleSecured').addEventListener('click', function () {
            state.showSecured = !state.showSecured;
            this.classList.toggle('is-on', state.showSecured);
            state.page = 0; loadList();
          });

          // Summary chips toggle stage filter.
          $('summaryStrip').addEventListener('click', function (e) {
            var btn = e.target.closest && e.target.closest('[data-stage]');
            if (!btn) return;
            var stage = btn.dataset.stage;
            var i = state.stageFilter.indexOf(stage);
            if (i === -1) state.stageFilter.push(stage); else state.stageFilter.splice(i, 1);
            btn.classList.toggle('is-on');
            btn.setAttribute('aria-pressed', i === -1 ? 'true' : 'false');
            state.page = 0; loadList();
          });

          // Sortable headers.
          document.querySelectorAll('#prospectsTable thead th[data-sort]').forEach(function (th) {
            th.addEventListener('click', function () {
              var key = th.dataset.sort;
              if (state.sortKey === key) {
                state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
              } else {
                state.sortKey = key;
                state.sortDir = key === 'last_activity_at' ? 'desc' : 'asc';
              }
              renderSortHeaders();
              state.page = 0; loadList();
            });
          });

          // Row click -> detail drawer.
          $('prospectsBody').addEventListener('click', function (e) {
            var tr = e.target.closest && e.target.closest('tr.prospect-row');
            if (!tr) return;
            var id = tr.dataset.id;
            var row = state.rows.find(function (r) { return r.id === id; });
            if (row) openDrawer(row);
          });

          if (state.canWrite) {
            var addBtn = $('addProspectBtn');
            if (addBtn) addBtn.addEventListener('click', openCreateDrawer);
          }
        }

        function renderSortHeaders() {
          document.querySelectorAll('#prospectsTable thead th[data-sort]').forEach(function (th) {
            th.classList.remove('admin-sort-asc', 'admin-sort-desc');
            if (th.dataset.sort === state.sortKey) {
              th.classList.add(state.sortDir === 'asc' ? 'admin-sort-asc' : 'admin-sort-desc');
            }
          });
        }

        function selectOptionsHtml(values, labels, current, includeBlank) {
          var opts = includeBlank ? ['<option value="">&mdash;</option>'] : [];

            opts.push('<option value="' + v + '"' + (v === current ? ' selected' : '') + '>' +

            title: row.full_name || 'Prospect',
            bodyHtml: buildDrawerBody(row, { secured: secured }),

          });

        function bindDrawer(row, opts) {
          if (!state.canWrite) return;

          var saveBtn = $('prospectSaveBtn');
          if (saveBtn) saveBtn.addEventListener('click', function () { saveCrm(row, opts); });

          // Stage select -> atomic RPC (separate from CRM patch).
          var stageSel = $('dwStage');
          if (stageSel) {
            stageSel.addEventListener('change', function () {
              var next = stageSel.value;
              if (next === row.stage) return;
              stageSel.disabled = true;
              setStage(row.id, next).then(function () {
                row.stage = next;
                toast('Stage → ' + (STAGE_LABEL[next] || next), 'success');
                refreshAfterChange();
                loadActivities(row.id);
              }).catch(function (err) {
                console.error('stage change failed', err);
                stageSel.value = row.stage;
                toast('Could not change stage.', 'error');
              }).finally(function () { stageSel.disabled = false; });
            });
          }

          var noteBtn = $('actNoteBtn');
          if (noteBtn) noteBtn.addEventListener('click', function () { logActivity(row.id, 'note'); });
          var logBtn = $('actLogBtn');
          if (logBtn) logBtn.addEventListener('click', function () { logActivity(row.id, null); });
        }

        // ---------------------------------------------------------------
        // Mutations
        // ---------------------------------------------------------------
        function collectCrm(secured) {
          function read(field) {
            var el = document.querySelector('#shellDrawerBody [data-crm="' + field + '"]');
            if (!el) return undefined;
            if (el.type === 'checkbox') return el.checked;
            return el.value;
          }
          function trimOrNull(v) {
            v = (v == null ? '' : String(v)).trim();
            return v.length ? v : null;
          }

          var patch = {
            priority: read('priority') || 'medium',
            status: read('status') || 'active',
            owner_id: read('owner_id') || null,
            next_action: trimOrNull(read('next_action')),
            next_action_date: trimOrNull(read('next_action_date')),
            notes: trimOrNull(read('notes')),
            do_not_contact: read('do_not_contact') === true,
            ask_target_cents: dollarsToCents(read('ask_target_cents')),
            committed_amount_cents: dollarsToCents(read('committed_amount_cents')),
            phone: trimOrNull(read('phone')),
            zip: trimOrNull(read('zip')),
            employer: trimOrNull(read('employer')),
            occupation: trimOrNull(read('occupation'))
          };
          var tagsRaw = read('tags');
          if (tagsRaw !== undefined) {
            patch.tags = String(tagsRaw).split(',').map(function (t) { return t.trim(); }).filter(Boolean);
          }
          // Identity fields only on non-secured rows.
          if (!secured) {
            patch.full_name = trimOrNull(read('full_name'));
            patch.first_name = trimOrNull(read('first_name'));
            patch.last_name = trimOrNull(read('last_name'));
            patch.email = trimOrNull(read('email'));
            patch.city = trimOrNull(read('city'));
            patch.county = trimOrNull(read('county'));
            patch.state = trimOrNull(read('state'));
          }
          return patch;
        }

        function saveCrm(row, opts) {
          var patch = collectCrm(opts.secured);
          if (!opts.secured && !patch.full_name) {
            toast('Full name is required.', 'error');
            return;
          }
          var btn = $('prospectSaveBtn');
          if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

          state.client.from('prospects').update(patch).eq('id', row.id)
            .then(function (resp) {
              if (resp.error) throw resp.error;
              toast('Prospect saved.', 'success');
              window.AdminShell.closeDrawer();
              refreshAfterChange();
            })
            .catch(function (err) {
              console.error('save failed', err);
              var msg = err && err.code === '23505' ? 'Another prospect already has that email.' : 'Could not save changes.';
              toast(msg, 'error');
              if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
            });
        }

        function setStage(id, stage) {
          return state.client.rpc('prospect_set_stage', { p_prospect_id: id, p_stage: stage })
            .then(function (resp) { if (resp.error) throw resp.error; return resp.data; });
        }

        function logActivity(id, forcedType) {
          var type = forcedType || ($('actType') ? $('actType').value : 'note');
          var subjEl = $('actSubject');
          var bodyEl = $('actBody');
          var dateEl = $('actDate');
          var subject = subjEl ? subjEl.value.trim() : '';
          var body = bodyEl ? bodyEl.value.trim() : '';

          if (forcedType === 'note' && !subject && !body) {
            toast('Add a subject or detail for the note.', 'error');
            return;
          }
          if (!forcedType && !subject && !body) {
            toast('Add a subject or detail.', 'error');
            return;
          }

          var occurred = (dateEl && dateEl.value)
            ? new Date(dateEl.value + 'T12:00:00').toISOString()
            : new Date().toISOString();

          var payload = {
            prospect_id: id,
            activity_type: type,
            subject: subject || null,
            body: body || null,
            occurred_at: occurred
          };

          var logBtn = $('actLogBtn'), noteBtn = $('actNoteBtn');
          if (logBtn) logBtn.disabled = true;
          if (noteBtn) noteBtn.disabled = true;

          state.client.from('prospect_activities').insert(payload)
            .then(function (resp) {
              if (resp.error) throw resp.error;
              if (subjEl) subjEl.value = '';
              if (bodyEl) bodyEl.value = '';
              toast('Activity logged.', 'success');
              loadActivities(id);
              // Contact types bump last_contacted_at via DB trigger; refresh list.
              if (CONTACT_TYPES.indexOf(type) !== -1) refreshAfterChange();
            })
            .catch(function (err) {
              console.error('activity log failed', err);
              toast('Could not log activity.', 'error');
            })
            .finally(function () {
              if (logBtn) logBtn.disabled = false;
              if (noteBtn) noteBtn.disabled = false;
            });
        }

        function loadActivities(id) {
          var list = $('actTimeline');
          if (!list) return;
          state.client.from('prospect_activities')
            .select('*')
            .eq('prospect_id', id)
            .order('occurred_at', { ascending: false })
            .then(function (resp) {
              if (resp.error) {
                list.innerHTML = '<li class="admin-muted" style="list-style:none">Could not load activity.</li>';
                return;
              }
              var acts = resp.data || [];
              if (state.activeId !== id) return; // drawer moved on
              if (acts.length === 0) {
                list.innerHTML = '<li class="admin-muted" style="list-style:none">No activity yet.</li>';
                return;
              }
              list.innerHTML = acts.map(function (a) {
                var actor = a.actor_email || (a.actor_id && state.adminUserById[a.actor_id]
                  ? (state.adminUserById[a.actor_id].full_name || state.adminUserById[a.actor_id].email)
                  : '');
                var meta = [escapeHtml(ACTIVITY_LABEL[a.activity_type] || a.activity_type)];
                meta[0] = '<span class="prospect-act-type">' + meta[0] + '</span>';
                if (actor) meta.push(escapeHtml(actor));
                meta.push(escapeHtml(fmtDateTime(a.occurred_at)));
                var subject = a.subject ? escapeHtml(a.subject) : escapeHtml(ACTIVITY_LABEL[a.activity_type] || a.activity_type);
                return '<li class="prospect-act">' +
                  '<span class="prospect-act-icon">' + (ACTIVITY_ICON[a.activity_type] || '•') + '</span>' +
                  '<div class="prospect-act-subject">' + subject + '</div>' +
                  (a.body ? '<div class="prospect-act-body">' + escapeHtml(a.body) + '</div>' : '') +
                  '<div class="prospect-act-meta">' + meta.join(' · ') + '</div>' +
                '</li>';
              }).join('');
            });
        }

        // ---------------------------------------------------------------
        // Create prospect
        // ---------------------------------------------------------------
        function openCreateDrawer() {
          if (!state.canWrite) return;
          var foot =
            '<button type="button" class="shell-btn shell-btn-outline" data-drawer-close>Cancel</button>' +
            '<button type="button" class="shell-btn shell-btn-primary" id="prospectCreateBtn">Create prospect</button>';

          window.AdminShell.openDrawer({
            eyebrow: 'New prospect',
            title: 'Add prospect',
            bodyHtml: buildCreateBody(),
            footHtml: foot
          });

          var btn = $('prospectCreateBtn');
          if (btn) btn.addEventListener('click', createProspect);
        }

        function buildCreateBody() {
          return '' +
            '<div class="shell-drawer-section">' +
              '<h4>Identity</h4>' +
              '<div class="prospect-form-grid">' +
                '<label class="span-2">Full name *<input class="admin-input" id="cFull" /></label>' +
                '<label>Email<input class="admin-input" id="cEmail" type="email" /></label>' +
                '<label>Phone<input class="admin-input" id="cPhone" /></label>' +
                '<label>City<input class="admin-input" id="cCity" /></label>' +
                '<label>County<input class="admin-input" id="cCounty" /></label>' +
                '<label>State<input class="admin-input" id="cState" value="OH" /></label>' +
                '<label>ZIP<input class="admin-input" id="cZip" /></label>' +
                '<label>Employer<input class="admin-input" id="cEmployer" /></label>' +
                '<label>Occupation<input class="admin-input" id="cOccupation" /></label>' +
              '</div>' +
            '</div>' +
            '<div class="shell-drawer-section">' +
              '<h4>Pipeline</h4>' +
              '<div class="prospect-form-grid">' +
                '<label>Stage<select class="admin-input" id="cStage">' + selectOptionsHtml(STAGES.filter(function (s) { return s !== 'secured'; }), STAGE_LABEL, 'identified', false) + '</select></label>' +
                '<label>Priority<select class="admin-input" id="cPriority">' + selectOptionsHtml(PRIORITY_OPTIONS, PRIORITY_LABEL, 'medium', false) + '</select></label>' +
                '<label>Owner<select class="admin-input" id="cOwner">' + ownerOptionsHtml(null) + '</select></label>' +
                '<label>Source<select class="admin-input" id="cSource">' + selectOptionsHtml(SOURCE_OPTIONS.filter(function (s) { return s !== 'founding_member'; }), SOURCE_LABEL, 'manual', false) + '</select></label>' +
                '<label class="span-2">Tags (comma-separated)<input class="admin-input" id="cTags" /></label>' +
              '</div>' +
            '</div>' +
            '<div class="shell-drawer-section">' +
              '<h4>Money &amp; workflow</h4>' +
              '<div class="prospect-form-grid">' +
                '<label>Ask target ($)<input class="admin-input" id="cAsk" inputmode="decimal" /></label>' +
                '<label>Next action date<input class="admin-input" id="cNextDate" type="date" /></label>' +
                '<label class="span-2">Next action<input class="admin-input" id="cNext" /></label>' +
                '<label class="span-2">Notes<textarea class="admin-input" id="cNotes"></textarea></label>' +
              '</div>' +
            '</div>';
        }

        function createProspect() {
          function v(id) { var el = $(id); return el ? el.value.trim() : ''; }
          function n(id) { var x = v(id); return x.length ? x : null; }

          var full = v('cFull');
          if (!full) { toast('Full name is required.', 'error'); return; }

          var tags = v('cTags').split(',').map(function (t) { return t.trim(); }).filter(Boolean);
          var payload = {
            full_name: full,
            email: n('cEmail'),
            phone: n('cPhone'),
            city: n('cCity'),
            county: n('cCounty'),
            state: n('cState') || 'OH',
            zip: n('cZip'),
            employer: n('cEmployer'),
            occupation: n('cOccupation'),
            stage: v('cStage') || 'identified',
            priority: v('cPriority') || 'medium',
            owner_id: n('cOwner'),
            source: v('cSource') || 'manual',
            tags: tags,
            ask_target_cents: dollarsToCents(v('cAsk')),
            next_action: n('cNext'),
            next_action_date: n('cNextDate'),
            notes: n('cNotes')
          };

          var btn = $('prospectCreateBtn');
          if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }

          state.client.from('prospects').insert(payload).select().single()
            .then(function (resp) {
              if (resp.error) throw resp.error;
              toast('Prospect added.', 'success');
              window.AdminShell.closeDrawer();
              state.page = 0;
              refreshAfterChange();
            })
            .catch(function (err) {
              console.error('create failed', err);
              var msg = err && err.code === '23505' ? 'A prospect with that email already exists.' : 'Could not create prospect.';
              toast(msg, 'error');
              if (btn) { btn.disabled = false; btn.textContent = 'Create prospect'; }
            });
        }
      })();
    </script>
    <script src="/admin/admin-responsive.js" defer></script>
  </body>
</html>
