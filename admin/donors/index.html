<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donors | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />

    <style>
      .donors-table-wrap { background: rgba(15, 34, 51, 0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 16px 8px; }
      .donors-table tbody tr { cursor: pointer; }
      .donors-table tbody tr:hover { background: rgba(115, 215, 238, 0.06); }
      .admin-pill-tier { background: rgba(115, 215, 238, 0.12); color: var(--color-light-blue); border: 1px solid rgba(115, 215, 238, 0.3); }
      .admin-pill-refcode { background: rgba(255, 196, 0, 0.10); color: #ffd86b; border: 1px solid rgba(255, 196, 0, 0.30); padding: 2px 8px; border-radius: 999px; font-size: 11px; font-family: "Roboto Slab", serif; letter-spacing: 0.2px; }
      .admin-pill-payment { background: rgba(140, 200, 140, 0.10); color: #b9e1b9; border: 1px solid rgba(140, 200, 140, 0.30); padding: 2px 8px; border-radius: 999px; font-size: 11px; }
    </style>
  </head>

  <body class="admin-shell">
    <div
      id="shell-root"
      data-active-nav="donors"
      data-page-eyebrow="Money"
      data-page-title="Donors"
      data-page-sub="Founding members, ActBlue contributions, and tier progress."
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>

    <script>
      (function () {
        'use strict';

        var TIER_ORDER = [
          'Founders Circle','Leadership','Champion','Advocate',
          'Stonewall Sustainer','Ally','Friend','Supporter'
        ];
        function tierFor(cents, recurrence) {
          if (recurrence === 'monthly' && cents >= 1969 && cents < 5000) return 'Stonewall Sustainer';
          if (cents >= 250000) return 'Founders Circle';
          if (cents >= 100000) return 'Leadership';
          if (cents >=  50000) return 'Champion';
          if (cents >=  25000) return 'Advocate';
          if (cents >=  10000) return 'Ally';
          if (cents >=   5000) return 'Friend';
          return 'Supporter';
        }

        var COLUMNS = [
          'id', 'full_name', 'display_name', 'email', 'phone',
          'amount_cents', 'recurrence',
          'recurring_amount_cents', 'recurring_type', 'recurring_duration', 'initial_recurring_at',
          'actblue_contribution_id', 'actblue_receipt_id', 'contributed_at',
          'is_public', 'is_vetted', 'founding_number', 'display_order',
          'address_line1', 'city', 'state', 'zip', 'country',
          'county', 'county_name', 'county_fips',
          'occupation', 'employer',
          'employer_address_line1', 'employer_city', 'employer_state', 'employer_zip', 'employer_country',
          'refcode', 'refcode_2',
          'contribution_form_url', 'form_owner_email', 'form_branding_name', 'recipient_committee',
          'payment_method', 'card_type',
          'actblue_fee_cents', 'stripe_fee_text',
          'via_mobile', 'is_actblue_express', 'is_refunded', 'is_cancelled_recurring',
          'recurring_upsell_shown', 'recurring_upsell_succeeded',
          'text_message_opt_in',
          'elected_office', 'jurisdiction',
          'notes'
        ];

        var COLSPAN = 12;

        var state = {
          rows: [], filtered: [],
          sortKey: 'founding_number', sortDir: 'asc',
          client: null, canWrite: false
        };

        document.addEventListener('admin-shell-ready', function (ev) {
          var detail = ev.detail || {};
          state.client = detail.client;
          state.canWrite = detail.can('donors','write');

          var actions = document.getElementById('shellPageActions');
          actions.innerHTML =
            '<a class="shell-btn shell-btn-outline" href="/founding-members" target="_blank" rel="noopener">View public roster</a>' +
            '<button type="button" class="shell-btn shell-btn-primary" id="exportCsv">Export CSV</button>';

          document.getElementById('shellBody').innerHTML = pageHtml();

          loadDonors().then(function (rows) {
            state.rows = rows;
            populateRefcodeFilter();
            renderStats();
            applyFilters();
          }).catch(function (err) {
            console.error('donors load failed', err);
            document.getElementById('donorsBody').innerHTML =
              '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row admin-error">' +
              'Could not load donors. Your role may not include this module.' +
              '</td></tr>';
          });

          bindEvents();
        });

        function pageHtml() {
          return [
            '<div class="admin-stat-grid">',
              '<div class="admin-stat"><div class="admin-stat-num" id="statMembers">0</div><div class="admin-stat-label">Members</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statRaised">$0</div><div class="admin-stat-label">Total Raised</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statPublic">0</div><div class="admin-stat-label">On Public Roster</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statProgress">0%</div><div class="admin-stat-label">Toward 1,969</div></div>',
            '</div>',

            '<div class="admin-toolbar">',
              '<input type="search" class="admin-input" id="filterSearch" placeholder="Search name, email, address, employer, ActBlue id, refcode..." autocomplete="off" />',
              '<select class="admin-input" id="filterTier"><option value="">All tiers</option>',
                TIER_ORDER.map(function (k) { return '<option value="' + k + '">' + k + '</option>'; }).join(''),
              '</select>',
              '<select class="admin-input" id="filterRefcode"><option value="">All refcodes</option></select>',
              '<select class="admin-input" id="filterPublic">',
                '<option value="">Public &amp; private</option>',
                '<option value="public">On public roster</option>',
                '<option value="private">Hidden from roster</option>',
              '</select>',
              '<select class="admin-input" id="filterVetted">',
                '<option value="">All vetting states</option>',
                '<option value="vetted">Vetted</option>',
                '<option value="unvetted">Awaiting vetting</option>',
              '</select>',
              '<span class="admin-toolbar-spacer"></span>',
              '<span class="admin-result-count" id="resultCount"></span>',
            '</div>',

            '<div class="donors-table-wrap">',
              '<div class="admin-table-wrap" style="border:none;">',
                '<table class="admin-table donors-table" id="donorsTable">',
                  '<thead><tr>',
                    '<th data-sort="founding_number" class="admin-sortable">#<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th data-sort="full_name" class="admin-sortable">Name<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>Email</th>',
                    '<th data-sort="amount_cents" class="admin-sortable admin-num">Amount<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>Tier</th>',
                    '<th>Refcode</th>',
                    '<th>Payment</th>',
                    '<th data-sort="contributed_at" class="admin-sortable">Contributed<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>City / County</th>',
                    '<th>Occupation / Employer</th>',
                    '<th class="admin-toggle-col">Public</th>',
                    '<th class="admin-toggle-col">Vetted</th>',
                  '</tr></thead>',
                  '<tbody id="donorsBody"><tr><td colspan="' + COLSPAN + '" class="admin-empty-row">Loading donors...</td></tr></tbody>',
                '</table>',
              '</div>',
            '</div>'
          ].join('');
        }

        // ---------------------------------------------------------------
        function loadDonors() {
          return state.client
            .from('founding_members')
            .select(COLUMNS.join(', '))
            .order('founding_number', { ascending: true, nullsFirst: false })
            .then(function (resp) {
              if (resp.error) throw resp.error;
              var rows = resp.data || [];
              for (var i = 0; i < rows.length; i++) {
                rows[i]._tier = tierFor(rows[i].amount_cents, rows[i].recurrence);
              }
              return rows;
            });
        }
        function toggleField(id, field, value) {
          var update = {}; update[field] = value;
          return state.client.from('founding_members').update(update).eq('id', id)
            .then(function (r) { if (r.error) throw r.error; });
        }

        function populateRefcodeFilter() {
          var seen = {};
          var codes = [];
          for (var i = 0; i < state.rows.length; i++) {
            var c = state.rows[i].refcode;
            if (c && !seen[c]) { seen[c] = true; codes.push(c); }
          }
          codes.sort();
          var sel = $('filterRefcode');
          sel.innerHTML = '<option value="">All refcodes</option>' +
            codes.map(function (c) { return '<option value="' + escapeAttr(c) + '">' + escapeHtml(c) + '</option>'; }).join('');
        }

        // ---------------------------------------------------------------
        function renderStats() {
          var totalMembers = state.rows.length;
          var totalCents = state.rows.reduce(function (s, r) { return s + (r.amount_cents || 0); }, 0);
          var publicCount = state.rows.filter(function (r) { return r.is_public && r.is_vetted; }).length;
          var goal = 1969;
          var pct = totalMembers > 0 ? Math.min(100, Math.round((totalMembers / goal) * 1000) / 10) : 0;

          $('statMembers').textContent  = totalMembers.toLocaleString();
          $('statRaised').textContent   = fmtMoney(totalCents);
          $('statPublic').textContent   = publicCount.toLocaleString();
          $('statProgress').textContent = pct + '%';
        }

        function applyFilters() {
          var q       = $('filterSearch').value.trim().toLowerCase();
          var tier    = $('filterTier').value;
          var refcode = $('filterRefcode').value;
          var pub     = $('filterPublic').value;
          var vet     = $('filterVetted').value;

          state.filtered = state.rows.filter(function (r) {
            if (tier    && r._tier   !== tier)    return false;
            if (refcode && r.refcode !== refcode) return false;
            if (pub === 'public'  && !(r.is_public && r.is_vetted)) return false;
            if (pub === 'private' &&   r.is_public && r.is_vetted)  return false;
            if (vet === 'vetted'   && !r.is_vetted) return false;
            if (vet === 'unvetted' &&  r.is_vetted) return false;
            if (q) {
              var hay = (
                (r.full_name||'') + ' ' + (r.display_name||'') + ' ' +
                (r.email||'') + ' ' + (r.phone||'') + ' ' +
                (r.address_line1||'') + ' ' + (r.city||'') + ' ' + (r.zip||'') + ' ' +
                (r.occupation||'') + ' ' + (r.employer||'') + ' ' +
                (r.refcode||'') + ' ' + (r.refcode_2||'') + ' ' +
                (r.actblue_receipt_id||'') + ' ' + (r.actblue_contribution_id||'')
              ).toLowerCase();
              if (hay.indexOf(q) === -1) return false;
            }
            return true;
          });
          applySort();
        }

        function applySort() {
          var key = state.sortKey, dir = state.sortDir === 'asc' ? 1 : -1;
          state.filtered.sort(function (a, b) {
            var av = a[key], bv = b[key];
            if (key === 'contributed_at') return ((new Date(av||0)) - (new Date(bv||0))) * dir;
            if (key === 'founding_number' || key === 'amount_cents') {
              var an = av == null ? Number.POSITIVE_INFINITY : Number(av);
              var bn = bv == null ? Number.POSITIVE_INFINITY : Number(bv);
              return (an - bn) * dir;
            }
            return String(av || '').localeCompare(String(bv || ''), undefined, { sensitivity:'base' }) * dir;
          });
          renderRows();
          renderSortHeaders();
        }
        function renderSortHeaders() {
          document.querySelectorAll('#donorsTable thead th[data-sort]').forEach(function (th) {
            th.classList.remove('admin-sort-asc','admin-sort-desc');
            if (th.dataset.sort === state.sortKey) {
              th.classList.add(state.sortDir === 'asc' ? 'admin-sort-asc' : 'admin-sort-desc');
            }
          });
        }

        function renderRows() {
          var body = $('donorsBody');
          $('resultCount').textContent =
            state.filtered.length === state.rows.length
              ? state.rows.length + ' total'
              : state.filtered.length + ' of ' + state.rows.length;

          if (state.filtered.length === 0) {
            var msg = state.rows.length === 0
              ? 'No founding members yet. ActBlue sync will populate this list as donations come in.'
              : 'No donors match the current filters.';
            body.innerHTML = '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row">' + msg + '</td></tr>';
            return;
          }

          body.innerHTML = state.filtered.map(function (r) {
            var nameMain = escapeHtml(r.full_name || r.display_name || '—');
            var subParts = '';
            if (r.display_name && r.display_name !== r.full_name) {
              subParts += '<span class="admin-cell-sub">Public: ' + escapeHtml(r.display_name) + '</span>';
            }
            if (r.elected_office) {
              subParts += '<span class="admin-cell-sub">' + escapeHtml(r.elected_office) +
                (r.jurisdiction ? ' &middot; ' + escapeHtml(r.jurisdiction) : '') + '</span>';
            }
            var foundingNum = r.founding_number ? '#' + r.founding_number : '<span class="admin-muted">&mdash;</span>';
            var emailHtml = r.email
              ? '<a href="mailto:' + escapeAttr(r.email) + '" class="admin-link" onclick="event.stopPropagation()">' + escapeHtml(r.email) + '</a>'
              : '<span class="admin-muted">&mdash;</span>';
            var amount = fmtMoney(r.amount_cents);
            if (r.recurrence === 'monthly') amount += '<span class="admin-cell-sub">/mo</span>';
            var tierBadge = '<span class="admin-pill admin-pill-tier">' + escapeHtml(r._tier) + '</span>';

            var refcodeCell = r.refcode
              ? '<span class="admin-pill-refcode">' + escapeHtml(r.refcode) + '</span>'
              : '<span class="admin-muted">&mdash;</span>';

            var paymentCell;
            if (r.payment_method || r.card_type) {
              paymentCell = '<span class="admin-pill-payment">' +
                escapeHtml(r.payment_method || r.card_type || '') + '</span>';
              if (r.card_type && r.payment_method && r.card_type !== r.payment_method) {
                paymentCell += '<span class="admin-cell-sub">' + escapeHtml(r.card_type) + '</span>';
              }
            } else {
              paymentCell = '<span class="admin-muted">&mdash;</span>';
            }

            var countyDisplay = r.county || (r.county_name ? r.county_name.replace(/ County$/, '') : '');
            var locParts = [r.city, countyDisplay ? countyDisplay + ' Co.' : ''].filter(Boolean).join(', ');
            var loc = locParts ? escapeHtml(locParts) : '<span class="admin-muted">&mdash;</span>';
            if (r.zip) loc += '<span class="admin-cell-sub">ZIP ' + escapeHtml(r.zip) + '</span>';
            if (r.actblue_receipt_id) {
              loc += '<span class="admin-cell-sub">ActBlue ' + escapeHtml(r.actblue_receipt_id) + '</span>';
            }

            var occEmp;
            if (r.occupation || r.employer) {
              occEmp = escapeHtml(r.occupation || '');
              if (r.employer) {
                occEmp += '<span class="admin-cell-sub">' + escapeHtml(r.employer) + '</span>';
              }
            } else {
              occEmp = '<span class="admin-muted">&mdash;</span>';
            }

            return '<tr data-id="' + escapeAttr(r.id) + '">' +
              '<td class="admin-num">' + foundingNum + '</td>' +
              '<td class="admin-cell-name">' + nameMain + subParts + '</td>' +
              '<td>' + emailHtml + '</td>' +
              '<td class="admin-num">' + amount + '</td>' +
              '<td>' + tierBadge + '</td>' +
              '<td>' + refcodeCell + '</td>' +
              '<td>' + paymentCell + '</td>' +
              '<td>' + escapeHtml(fmtDate(r.contributed_at)) + '</td>' +
              '<td>' + loc + '</td>' +
              '<td>' + occEmp + '</td>' +
              '<td class="admin-toggle-col">' + toggleHtml(r.id, 'is_public', r.is_public) + '</td>' +
              '<td class="admin-toggle-col">' + toggleHtml(r.id, 'is_vetted', r.is_vetted) + '</td>' +
            '</tr>';
          }).join('');
        }
        function toggleHtml(id, field, on) {
          var disabled = state.canWrite ? '' : ' disabled';
          return '<label class="admin-switch" onclick="event.stopPropagation()">' +
            '<input type="checkbox" data-toggle="' + field + '" data-id="' + escapeAttr(id) + '"' +
            (on ? ' checked' : '') + disabled + ' />' +
            '<span class="admin-switch-slider"></span>' +
          '</label>';
        }

        // ---------------------------------------------------------------
        function openDonorDrawer(r) {
          function rowFor(label, value) {
            var rendered = value == null || value === '' ? '<span class="admin-muted">&mdash;</span>' : value;
            return '<dt>' + escapeHtml(label) + '</dt><dd>' + rendered + '</dd>';
          }
          function v(x) { return x == null || x === '' ? '' : escapeHtml(String(x)); }
          function vBool(x) { return x == null ? '' : (x ? 'Yes' : 'No'); }
          function vMoney(c) { return c == null ? '' : fmtMoney(c); }

          var contribution = [
            rowFor('Amount', '<strong>' + fmtMoney(r.amount_cents) + (r.recurrence === 'monthly' ? '/mo' : '') + '</strong>'),
            rowFor('Tier', '<span class="admin-pill admin-pill-tier">' + escapeHtml(r._tier) + '</span>'),
            rowFor('Contributed', v(fmtDateTime(r.contributed_at))),
            rowFor('Recurrence', r.recurrence === 'monthly' ? 'Monthly' : 'One-time'),
            rowFor('Recurring amount', vMoney(r.recurring_amount_cents)),
            rowFor('Recurring type', v(r.recurring_type)),
            rowFor('Recurring duration', v(r.recurring_duration)),
            rowFor('Initial recurring at', v(fmtDateTime(r.initial_recurring_at))),
            rowFor('Refcode', v(r.refcode)),
            rowFor('Refcode 2', v(r.refcode_2)),
            rowFor('ActBlue order', v(r.actblue_receipt_id)),
            rowFor('ActBlue lineitem', v(r.actblue_contribution_id)),
            rowFor('Form URL', r.contribution_form_url ? '<a class="admin-link" href="' + escapeAttr(r.contribution_form_url) + '" target="_blank" rel="noopener">' + escapeHtml(r.contribution_form_url) + '</a>' : ''),
            rowFor('Form owner email', v(r.form_owner_email)),
            rowFor('Form branding', v(r.form_branding_name)),
            rowFor('Recipient committee', v(r.recipient_committee))
          ].join('');

          var donor = [
            rowFor('Founding number', r.founding_number ? '<strong>#' + r.founding_number + '</strong>' : ''),
            rowFor('Full name', v(r.full_name)),
            rowFor('Display name', v(r.display_name)),
            rowFor('Email', r.email ? '<a href="mailto:' + escapeAttr(r.email) + '">' + escapeHtml(r.email) + '</a>' : ''),
            rowFor('Phone', v(r.phone)),
            rowFor('Address', v(r.address_line1)),
            rowFor('City', v(r.city)),
            rowFor('State', v(r.state)),
            rowFor('ZIP', v(r.zip)),
            rowFor('County', v(r.county || (r.county_name ? r.county_name.replace(/ County$/, '') : ''))),
            rowFor('Country', v(r.country)),
            rowFor('Occupation', v(r.occupation)),
            rowFor('Employer', v(r.employer)),
            rowFor('Employer address', v(r.employer_address_line1)),
            rowFor('Employer city', v(r.employer_city)),
            rowFor('Employer state', v(r.employer_state)),
            rowFor('Employer ZIP', v(r.employer_zip)),
            rowFor('Employer country', v(r.employer_country)),
            rowFor('Elected office', v(r.elected_office)),
            rowFor('Jurisdiction', v(r.jurisdiction))
          ].join('');

          var paymentFlags = [
            rowFor('Payment method', v(r.payment_method)),
            rowFor('Card type', v(r.card_type)),
            rowFor('ActBlue fee', vMoney(r.actblue_fee_cents)),
            rowFor('Stripe fee', v(r.stripe_fee_text)),
            rowFor('Via mobile', vBool(r.via_mobile)),
            rowFor('ActBlue Express', vBool(r.is_actblue_express)),
            rowFor('Refunded', vBool(r.is_refunded)),
            rowFor('Cancelled recurring', vBool(r.is_cancelled_recurring)),
            rowFor('Recurring upsell shown', vBool(r.recurring_upsell_shown)),
            rowFor('Recurring upsell succeeded', vBool(r.recurring_upsell_succeeded)),
            rowFor('Text opt-in', v(r.text_message_opt_in)),
            rowFor('Display order', r.display_order != null ? String(r.display_order) : ''),
            rowFor('On public roster', r.is_public ? 'Yes' : 'No'),
            rowFor('Vetted', r.is_vetted ? 'Yes' : 'No')
          ].join('');

          var notes = r.notes
            ? '<div class="shell-drawer-section"><h4>Internal notes</h4><pre style="white-space:pre-wrap;font-family:inherit;margin:0;">' + escapeHtml(r.notes) + '</pre></div>'
            : '';

          var body =
            '<div class="shell-drawer-section"><h4>Contribution</h4><dl>' + contribution + '</dl></div>' +
            '<div class="shell-drawer-section"><h4>Donor</h4><dl>' + donor + '</dl></div>' +
            '<div class="shell-drawer-section"><h4>Payment &amp; flags</h4><dl>' + paymentFlags + '</dl></div>' +
            notes;

          var foot = '<a class="shell-btn shell-btn-outline" href="mailto:' + escapeAttr(r.email || '') + '">Email donor</a>' +
            '<button type="button" class="shell-btn shell-btn-primary" data-drawer-close>Done</button>';

          window.AdminShell.openDrawer({
            eyebrow: r._tier,
            title: r.full_name || 'Donor',
            bodyHtml: body,
            footHtml: foot
          });
        }

        // ---------------------------------------------------------------
        function bindEvents() {
          var debT;
          $('filterSearch').addEventListener('input', function () { clearTimeout(debT); debT = setTimeout(applyFilters, 150); });
          $('filterTier').addEventListener('change',    applyFilters);
          $('filterRefcode').addEventListener('change', applyFilters);
          $('filterPublic').addEventListener('change',  applyFilters);
          $('filterVetted').addEventListener('change',  applyFilters);

          document.querySelectorAll('#donorsTable thead th[data-sort]').forEach(function (th) {
            th.addEventListener('click', function (ev) {
              var key = ev.currentTarget.dataset.sort;
              if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
              else { state.sortKey = key; state.sortDir = key === 'contributed_at' || key === 'amount_cents' ? 'desc' : 'asc'; }
              applySort();
            });
          });

          var body = $('donorsBody');
          body.addEventListener('click', function (ev) {
            var tr  = ev.target.closest('tr[data-id]');
            if (!tr) return;
            var input = ev.target.closest('input,a,label');
            if (input) return;
            var id = tr.dataset.id;
            var row = state.rows.find(function (r) { return r.id === id; });
            if (row) openDonorDrawer(row);
          });
          body.addEventListener('change', function (ev) {
            var input = ev.target;
            if (!input || input.tagName !== 'INPUT' || !input.dataset.toggle) return;
            if (!state.canWrite) {
              window.AdminShell.toast('Your role does not include write access.', 'error');
              input.checked = !input.checked;
              return;
            }
            var id = input.dataset.id;
            var field = input.dataset.toggle;
            var value = input.checked;
            input.disabled = true;
            toggleField(id, field, value).then(function () {
              for (var i = 0; i < state.rows.length; i++) {
                if (state.rows[i].id === id) { state.rows[i][field] = value; break; }
              }
              renderStats();
              window.AdminShell.toast(
                (field === 'is_public' ? 'Public roster' : 'Vetting') + (value ? ' enabled.' : ' disabled.'),
                'success'
              );
            }).catch(function (err) {
              console.error('Toggle failed:', err);
              input.checked = !value;
              window.AdminShell.toast('Could not update. Please try again.', 'error');
            }).finally(function () { input.disabled = false; });
          });

          document.getElementById('exportCsv').addEventListener('click', exportCsv);
        }

        function exportCsv() {
          if (state.filtered.length === 0) {
            window.AdminShell.toast('Nothing to export with the current filters.', 'error');
            return;
          }
          var cols = [
            'founding_number','full_name','display_name','email','phone',
            'amount_cents','recurrence','_tier','contributed_at',
            'refcode','refcode_2','payment_method','card_type',
            'address_line1','city','state','zip','county','county_name',
            'occupation','employer',
            'employer_address_line1','employer_city','employer_state','employer_zip',
            'actblue_fee_cents','stripe_fee_text',
            'via_mobile','is_actblue_express','is_refunded','is_cancelled_recurring',
            'recurring_amount_cents','recurring_type','recurring_duration',
            'text_message_opt_in','elected_office','jurisdiction',
            'is_public','is_vetted',
            'actblue_receipt_id','actblue_contribution_id'
          ];
          var lines = [cols.join(',')];
          state.filtered.forEach(function (r) {
            lines.push(cols.map(function (c) {
              var v = r[c];
              if (typeof v === 'boolean') v = v ? 'true' : 'false';
              if (v == null) v = '';
              v = String(v).replace(/"/g, '""');
              return /[,"\n]/.test(v) ? '"' + v + '"' : v;
            }).join(','));
          });
          var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'ohio-pride-donors-' + new Date().toISOString().slice(0,10) + '.csv';
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
          window.AdminShell.toast('Exported ' + state.filtered.length + ' donors.', 'success');
        }

        // Helpers
        function $(id) { return document.getElementById(id); }
        function fmtMoney(cents) {
          var dollars = (cents || 0) / 100;
          return dollars.toLocaleString('en-US', {
            style: 'currency', currency: 'USD',
            maximumFractionDigits: dollars % 1 === 0 ? 0 : 2
          });
        }
        function fmtDate(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        function fmtDateTime(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        }
        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
          });
        }
        function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
      })();
    </script>
  </body>
</html>
