<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scorecard | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />
    <link rel="stylesheet" href="/admin/admin-responsive.css" />
    <style>
      /* =====================================================================
         Scorecard admin — dark theme (matches admin-shell)
         All colors derive from --text-* / --border-* tokens in style.css so
         the page reads as part of the admin app, not the (legacy) light skin.
         Grade tile colors match the methodology page at /methodology exactly.
         ===================================================================== */

      .admin-expand-btn {
        background: rgba(15, 34, 51, 0.6);
        border: 1px solid var(--border-medium);
        border-radius: 6px;
        font-size: 0.85rem;
        line-height: 1;
        padding: 4px 8px;
        cursor: pointer;
        color: var(--text-light);
      }
      .admin-expand-btn:hover { background: rgba(255, 255, 255, 0.05); }
      .admin-expand-btn[aria-expanded="true"] { background: rgba(112, 214, 236, 0.12); border-color: rgba(112, 214, 236, 0.45); color: var(--text-accent); }

      tr.admin-detail-row > td {
        background: rgba(15, 34, 51, 0.45);
        color: var(--text-light);
        border-top: 0;
        padding: 14px 18px 18px;
      }
      .admin-detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px 18px;
      }
      .admin-detail-grid dt {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin: 0;
      }
      .admin-detail-grid dd {
        margin: 0 0 2px;
        font-size: 0.92rem;
        color: var(--text-white);
        word-break: break-word;
      }
      .admin-detail-section-title {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-accent);
        margin: 16px 0 6px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .admin-detail-section-title:first-child { margin-top: 0; }

      /* Grade pills — values match /methodology (Champion/Strong ally/etc.).
         A composite >= 95 = A+, >= 88 = A, >= 78 = A-, >= 60 = B, >= 38 = C,
         >= 18 = D, < 18 = F. Mirrors compute_legislator_score() exactly. */
      .admin-grade {
        display: inline-block;
        min-width: 2.4em;
        text-align: center;
        font-weight: 800;
        font-size: 0.95rem;
        padding: 2px 8px;
        border-radius: 6px;
        border: 1px solid transparent;
      }
      .admin-grade-Aplus  { background: rgba(22, 163, 74, 0.18);  color: #4ade80; border-color: rgba(22, 163, 74, 0.50); }
      .admin-grade-A      { background: rgba(34, 197, 94, 0.16);  color: #34d399; border-color: rgba(34, 197, 94, 0.45); }
      .admin-grade-Aminus { background: rgba(101, 163, 13, 0.18); color: #a3e635; border-color: rgba(101, 163, 13, 0.45); }
      .admin-grade-B      { background: rgba(132, 204, 22, 0.18); color: #bef264; border-color: rgba(132, 204, 22, 0.45); }
      .admin-grade-C      { background: rgba(234, 179, 8, 0.18);  color: #facc15; border-color: rgba(234, 179, 8, 0.45); }
      .admin-grade-D      { background: rgba(249, 115, 22, 0.18); color: #fb923c; border-color: rgba(249, 115, 22, 0.45); }
      .admin-grade-F      { background: rgba(220, 38, 38, 0.18);  color: #ff8a8a; border-color: rgba(220, 38, 38, 0.50); }
      .admin-grade-NA     { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border-color: var(--border-medium); }

      .admin-party-D { color: #93c5fd; font-weight: 700; }
      .admin-party-R { color: #fca5a5; font-weight: 700; }
      td.admin-cell-tight { white-space: nowrap; }

      /* Editor-specific styles */
      .sc-status {
        display: inline-block;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 700;
        border: 1px solid transparent;
      }
      .sc-status-clean { background: rgba(74, 222, 128, 0.14); color: #4ade80; border-color: rgba(74, 222, 128, 0.45); }
      .sc-status-dirty { background: rgba(255, 200, 87, 0.14); color: #ffc857; border-color: rgba(255, 200, 87, 0.45); }
      .sc-status-unpub { background: rgba(255, 107, 107, 0.14); color: #ff8a8a; border-color: rgba(255, 107, 107, 0.45); }

      .sc-score-compare {
        display: flex; gap: 24px; flex-wrap: wrap;
        background: rgba(15, 34, 51, 0.6);
        border: 1px solid var(--border-light);
        border-radius: 8px;
        padding: 12px 16px; margin-bottom: 14px;
      }
      .sc-score-compare > div {
        display: flex; flex-direction: column; gap: 4px; min-width: 110px;
      }
      .sc-score-compare .sc-label {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted); font-weight: 700;
      }
      .sc-score-compare .sc-value {
        font-size: 1.4rem; font-weight: 800; color: var(--text-white);
      }
      .sc-score-compare .sc-value-sub {
        font-size: 0.85rem; color: var(--text-muted); font-weight: 500;
      }
      .sc-changed-arrow { color: #ffc857; font-weight: 700; }

      .sc-votes-table {
        width: 100%; border-collapse: collapse; margin: 4px 0 8px;
        font-size: 0.88rem;
        color: var(--text-light);
      }
      .sc-votes-table th, .sc-votes-table td {
        text-align: left; padding: 6px 8px;
        border-bottom: 1px solid var(--border-light);
      }
      .sc-votes-table th {
        background: rgba(15, 34, 51, 0.7);
        font-size: 0.74rem;
        text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted);
        font-weight: 700;
      }
      .sc-votes-table tr:last-child td { border-bottom: 0; }
      .sc-votes-table td strong { color: var(--text-white); }

      .sc-vote-pill {
        display: inline-block; min-width: 1.8em; text-align: center;
        padding: 2px 6px; border-radius: 4px; font-weight: 700;
        font-size: 0.85rem;
        border: 1px solid transparent;
      }
      .sc-vote-Y  { background: rgba(74, 222, 128, 0.18); color: #4ade80; border-color: rgba(74, 222, 128, 0.45); }
      .sc-vote-N  { background: rgba(255, 107, 107, 0.18); color: #ff8a8a; border-color: rgba(255, 107, 107, 0.45); }
      .sc-vote-NV { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border-color: var(--border-medium); }
      .sc-vote-E  { background: rgba(255, 200, 87, 0.14); color: #ffc857; border-color: rgba(255, 200, 87, 0.45); }
      .sc-vote-default { font-style: italic; opacity: 0.7; color: var(--text-muted); }
      .sc-vote-exception-marker { color: #ffc857; font-weight: 700; margin-left: 4px; }

      .sc-vote-btn {
        font-size: 0.78rem; padding: 3px 8px; border: 1px solid var(--border-medium);
        background: rgba(15, 34, 51, 0.6); border-radius: 4px; cursor: pointer;
        margin-right: 2px; color: var(--text-light);
      }
      .sc-vote-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text-white); }
      .sc-vote-btn.is-active { background: var(--text-accent); color: #0a1b2a; border-color: var(--text-accent); }
      .sc-vote-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

      .sc-action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .sc-pill-action {
        font-size: 0.82rem; padding: 5px 10px; border-radius: 4px;
        border: 1px solid var(--border-medium); background: rgba(15, 34, 51, 0.6);
        color: var(--text-light); cursor: pointer; font-weight: 600;
        text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      }
      .sc-pill-action:hover { background: rgba(255, 255, 255, 0.06); color: var(--text-white); }
      .sc-pill-action-primary  { background: var(--text-accent); color: #0a1b2a; border-color: var(--text-accent); }
      .sc-pill-action-primary:hover { background: #8de4f2; color: #0a1b2a; }
      .sc-pill-action-publish  { background: #4ade80; color: #0a1b2a; border-color: #4ade80; }
      .sc-pill-action-publish:hover { background: #5fe89a; color: #0a1b2a; }
      .sc-pill-action[disabled] { opacity: 0.5; cursor: not-allowed; }

      .sc-sponsorship-row {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 0; border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem; color: var(--text-light);
      }
      .sc-sponsorship-row:last-child { border-bottom: 0; }
      .sc-sponsorship-row .sc-bill-label { flex: 1; font-weight: 600; color: var(--text-white); }
      .sc-sponsorship-role-select {
        font-size: 0.85rem; padding: 4px 8px; border: 1px solid var(--border-medium);
        border-radius: 4px; background: rgba(15, 34, 51, 0.6); color: var(--text-white);
      }

      .sc-bills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 4px 18px; }

      .sc-no-data { font-style: italic; color: var(--text-muted); font-size: 0.86rem; padding: 8px 0; }

      /* Vote drawer form (lives inside the dark shell-drawer-panel). */
      .sc-roll-call-modal-bd {
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px;
      }
      .sc-roll-call-modal-bd label {
        display: flex; flex-direction: column; gap: 4px;
        font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted); font-weight: 700;
      }
      .sc-roll-call-modal-bd label.sc-wide { grid-column: 1 / -1; }
      .sc-roll-call-modal-bd input,
      .sc-roll-call-modal-bd select,
      .sc-roll-call-modal-bd textarea {
        font: inherit; font-size: 0.92rem; padding: 8px 10px;
        border: 1px solid var(--border-medium); border-radius: 6px;
        text-transform: none; letter-spacing: 0;
        color: var(--text-white);
        background: rgba(15, 34, 51, 0.6);
      }
      .sc-roll-call-modal-bd input:focus,
      .sc-roll-call-modal-bd select:focus,
      .sc-roll-call-modal-bd textarea:focus {
        outline: none; border-color: var(--text-accent);
        box-shadow: 0 0 0 3px rgba(112, 214, 236, 0.18);
      }
      .sc-roll-call-modal-bd textarea { min-height: 60px; resize: vertical; }
      .sc-roll-call-modal-bd select option { background: var(--dark-bg); color: var(--text-white); }

      .sc-publish-banner {
        background: rgba(255, 200, 87, 0.10);
        border: 1px solid rgba(255, 200, 87, 0.45);
        border-radius: 6px;
        padding: 10px 14px; margin-bottom: 14px; font-size: 0.9rem;
        color: var(--text-light);
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .sc-publish-banner strong { color: #ffc857; }
      .sc-publish-banner a { color: var(--text-accent); }

      /* Methodology summary callout */
      .sc-method-callout {
        background: rgba(15, 34, 51, 0.55);
        border: 1px solid var(--border-light);
        border-left: 3px solid var(--text-accent);
        border-radius: 8px;
        padding: 12px 16px;
        margin: 0 0 18px;
        color: var(--text-light);
      }
      .sc-method-callout > summary {
        list-style: none;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-accent);
        outline: none;
        display: flex; align-items: center; gap: 8px;
      }
      .sc-method-callout > summary::-webkit-details-marker { display: none; }
      .sc-method-callout > summary::after {
        content: '+';
        margin-left: auto;
        font-size: 18px;
        font-weight: 400;
        color: var(--text-muted);
      }
      .sc-method-callout[open] > summary::after { content: '\2212'; }
      .sc-method-body { margin-top: 12px; font-size: 13px; line-height: 1.55; }
      .sc-method-formula {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: rgba(15, 34, 51, 0.8);
        border: 1px solid var(--border-light);
        border-radius: 6px;
        padding: 10px 12px;
        margin: 10px 0;
        color: var(--text-white);
        font-size: 13px;
      }
      .sc-method-formula .sc-fm-token { color: var(--text-accent); font-weight: 700; }
      .sc-method-grades {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 6px 10px; margin-top: 10px;
      }
      .sc-method-grade-row {
        display: flex; align-items: center; gap: 8px;
        font-size: 12px; color: var(--text-light);
      }
      .sc-method-grade-row .admin-grade { min-width: 2.4em; font-size: 0.78rem; padding: 1px 7px; }
      .sc-method-grade-row .sc-mg-range { color: var(--text-muted); font-variant-numeric: tabular-nums; }
      .sc-method-grade-row .sc-mg-label { margin-left: auto; color: var(--text-muted); }
      .sc-method-callout a {
        color: var(--text-accent); text-decoration: none; font-weight: 600;
      }
      .sc-method-callout a:hover { text-decoration: underline; }
    </style>
  </head>
  <body class="admin-shell">
    <div id="shell-root"
         data-active-nav="legislators"
         data-page-eyebrow="Statehouse"
         data-page-title="Scorecard"
         data-page-sub="Edit roll calls, sponsorships, and equality grades. Publish to push to /scorecard."></div>

    <template id="legTpl">
      <div class="shell-widget admin-panel">
        <div class="admin-stat-grid" id="statGrid">
          <div class="admin-stat">
            <div class="admin-stat-num" id="statTotal">0</div>
            <div class="admin-stat-label">Members</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-num" id="statHouse">0</div>
            <div class="admin-stat-label">House</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-num" id="statSenate">0</div>
            <div class="admin-stat-label">Senate</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-num" id="statGraded">0</div>
            <div class="admin-stat-label">Graded</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-num" id="statUnpub">0</div>
            <div class="admin-stat-label">Unpublished</div>
          </div>
        </div>

        <div id="publishBanner" class="sc-publish-banner" hidden>
          <span><strong id="publishBannerCount">0</strong> legislators have draft changes that
            haven&rsquo;t been published to <a href="/scorecard" target="_blank" rel="noopener">/scorecard</a>.</span>
          <button type="button" class="sc-pill-action sc-pill-action-publish" id="publishAllBtn">
            Publish all changes
          </button>
        </div>

        <details class="sc-method-callout">
          <summary>Grading methodology &mdash; how Floor / Committee / Sponsorship roll up to a grade</summary>
          <div class="sc-method-body">
            <p>Three editorial subscores, each clamped to <strong>&minus;5 &hellip; +5</strong>, feed one composite. The composite is clamped to 0&ndash;100 and the letter grade is applied from a fixed table. Baseline is the same for every member regardless of party, chamber, or caucus.</p>
            <div class="sc-method-formula">
              score = clamp(0, 100, round(<span class="sc-fm-token">50</span> + (<span class="sc-fm-token">Vf</span> &times; 4) + (<span class="sc-fm-token">Vc</span> &times; 4) + (<span class="sc-fm-token">S</span> &times; 2)))
            </div>
            <p style="margin: 6px 0 0; color: var(--text-muted); font-size: 12px;">Vf = Floor Votes, Vc = Committee Votes, S = Sponsorship. Floor &amp; Committee weight 4&times;; Sponsorship weights 2&times; (sponsorship is a public commitment, not a recorded vote).</p>
            <div class="sc-method-grades">
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-Aplus">A+</span><span class="sc-mg-range">95&ndash;100</span><span class="sc-mg-label">Champion</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-A">A</span><span class="sc-mg-range">88&ndash;94</span><span class="sc-mg-label">Strong ally</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-Aminus">A&minus;</span><span class="sc-mg-range">78&ndash;87</span><span class="sc-mg-label">Reliable ally</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-B">B</span><span class="sc-mg-range">60&ndash;77</span><span class="sc-mg-label">Supportive</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-C">C</span><span class="sc-mg-range">38&ndash;59</span><span class="sc-mg-label">Mixed record</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-D">D</span><span class="sc-mg-range">18&ndash;37</span><span class="sc-mg-label">Unfriendly</span></div>
              <div class="sc-method-grade-row"><span class="admin-grade admin-grade-F">F</span><span class="sc-mg-range">0&ndash;17</span><span class="sc-mg-label">Hostile</span></div>
            </div>
            <p style="margin: 12px 0 0; color: var(--text-muted); font-size: 12px;">Full source: <a href="/methodology" target="_blank" rel="noopener">/methodology</a>. The thresholds and formula here match the public page and the <code>compute_legislator_score()</code> function in the database 1:1.</p>
          </div>
        </details>

        <div class="admin-toolbar">
          <input type="search" class="admin-input" id="filterSearch"
                 placeholder="Search name, district, leadership role&hellip;" autocomplete="off" />
          <select class="admin-input" id="filterChamber">
            <option value="">Both chambers</option>
            <option value="house">House</option>
            <option value="senate">Senate</option>
          </select>
          <select class="admin-input" id="filterParty"><option value="">All parties</option></select>
          <select class="admin-input" id="filterGrade">
            <option value="">All grades</option>
            <option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
            <option value="F">F</option><option value="NA">Ungraded</option>
          </select>
          <select class="admin-input" id="filterPublish">
            <option value="">All publish states</option>
            <option value="dirty">Has draft changes</option>
            <option value="unpub">Never published</option>
            <option value="clean">Up to date</option>
          </select>
          <span class="admin-toolbar-spacer"></span>
          <span class="admin-result-count" id="resultCount"></span>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table" id="legTable">
            <thead>
              <tr>
                <th class="admin-toggle-col" aria-label="Expand"></th>
                <th data-sort="full_name" class="admin-sortable">Member<span class="admin-sort-arrow">&darr;</span></th>
                <th data-sort="chamber" class="admin-sortable">Chamber<span class="admin-sort-arrow">&darr;</span></th>
                <th data-sort="party" class="admin-sortable">Party<span class="admin-sort-arrow">&darr;</span></th>
                <th data-sort="district" class="admin-sortable admin-num">District<span class="admin-sort-arrow">&darr;</span></th>
                <th data-sort="grade" class="admin-sortable">Grade<span class="admin-sort-arrow">&darr;</span></th>
                <th data-sort="score" class="admin-sortable admin-num">Score<span class="admin-sort-arrow">&darr;</span></th>
                <th>Publish State</th>
                <th>Contact</th>
              </tr>
            </thead>
            <tbody id="legBody">
              <tr><td colspan="9" class="admin-empty-row">Loading legislators&hellip;</td></tr>
            </tbody>
          </table>
        </div>

        <p class="admin-panel-foot">
          Editing roll calls / exceptions / sponsorships writes to the draft tables;
          /scorecard only updates when you publish. Public site:
          <a href="/scorecard.html" target="_blank" rel="noopener">/scorecard</a>.
        </p>
      </div>
      <div class="admin-toast" id="toast"></div>

      <!-- Add Vote modal -->
      <div class="shell-drawer" id="voteDrawer" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="shell-drawer-scrim" data-vote-drawer-close></div>
        <div class="shell-drawer-panel">
          <div class="shell-drawer-head">
            <div>
              <div class="shell-drawer-sub" id="voteDrawerSub">Add roll call</div>
              <h3 class="shell-drawer-title" id="voteDrawerTitle">New committee or floor vote</h3>
            </div>
            <button class="shell-drawer-close" data-vote-drawer-close aria-label="Close">&times;</button>
          </div>
          <div class="shell-drawer-body">
            <form id="voteForm" autocomplete="off">
              <div class="sc-roll-call-modal-bd">
                <label class="sc-wide">Bill
                  <select id="voteBill" required></select>
                </label>
                <label>Stage
                  <select id="voteStage" required>
                    <option value="committee">Committee report</option>
                    <option value="pass">Floor passage</option>
                    <option value="concur">Concurrence</option>
                    <option value="override">Veto override</option>
                    <option value="amend">Floor amendment</option>
                    <option value="introduce">Introduce</option>
                  </select>
                </label>
                <label>Chamber
                  <select id="voteChamber" required>
                    <option value="house">House</option>
                    <option value="senate">Senate</option>
                  </select>
                </label>
                <label>Date
                  <input id="voteDate" type="date" required />
                </label>
                <label>Label / Description
                  <input id="voteLabel" type="text" required placeholder="e.g. House Passage" />
                </label>
                <label>Yeas
                  <input id="voteYeas" type="number" min="0" value="0" required />
                </label>
                <label>Nays
                  <input id="voteNays" type="number" min="0" value="0" required />
                </label>
                <label class="sc-wide">Result text
                  <input id="voteResult" type="text" required placeholder="e.g. Passed 60-31" />
                </label>
                <label>This member's vote
                  <select id="voteMemberVote">
                    <option value="">Use party-line default</option>
                    <option value="Y">Y &mdash; Yes</option>
                    <option value="N">N &mdash; No</option>
                    <option value="NV">NV &mdash; Did not vote</option>
                    <option value="E">E &mdash; Excused</option>
                  </select>
                </label>
                <label>Exception note (optional)
                  <input id="voteMemberNote" type="text" placeholder="Crossed party line, recorded absent, ..." />
                </label>
                <label class="sc-wide">Notes (shared, optional)
                  <textarea id="voteNotes" placeholder="Editorial note on this roll call (visible to all members)"></textarea>
                </label>
              </div>
            </form>
          </div>
          <div class="shell-drawer-foot" id="voteDrawerFoot">
            <button type="button" class="sc-pill-action" data-vote-drawer-close>Cancel</button>
            <button type="button" class="sc-pill-action sc-pill-action-primary" id="voteSaveBtn">
              Save vote
            </button>
          </div>
        </div>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>
    <script>
      (function () {
        'use strict';

        var COLSPAN = 9;
        var GRADE_RANK = { 'A+': 6, A: 5, 'A-': 4.5, B: 4, C: 3, D: 2, F: 1 };

        var STAGE_LABEL = {
          introduce: 'Introduce', amend: 'Amend', committee: 'Committee',
          pass: 'Floor passage', concur: 'Concurrence', override: 'Veto override'
        };
        var FLOOR_STAGES = ['pass', 'concur', 'override'];
        var CMTE_STAGES  = ['committee'];

        var state = {
          rows: [],
          filtered: [],
          sortKey: 'score',
          sortDir: 'desc',
          expanded: Object.create(null),
          // Data caches
          bills: [],
          rollCalls: [],
          exceptions: [],
          sponsorships: [],   // [{ legislator_id, bill_slug, role }]
          // Computed-state caches
          computed: Object.create(null), // legislator_id -> computed scorecard
          published: Object.create(null),// legislator_id -> latest score_snapshots row
          // The currently-open vote modal context
          voteContext: null, // { legislator_id, chamber }
          // Permission flag
          canWrite: false,
        };

        function $(id) { return document.getElementById(id); }

        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
          });
        }

        function titleCase(s) {
          return String(s || '').replace(/[_-]+/g, ' ')
            .replace(/\b\w/g, function (m) { return m.toUpperCase(); });
        }

        function fmtDate(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function fmtScore(s) {
          if (s == null || s === '') return null;
          var n = Number(s);
          return isNaN(n) ? null : (Math.round(n * 10) / 10);
        }

        // Maps the canonical grade strings produced by compute_legislator_score()
        // (A+, A, A-, B, C, D, F) to CSS classes. Anything outside that set is
        // treated as ungraded ("NA"). Mirrors the grade table on /methodology.
        function gradeClass(g) {
          switch (g) {
            case 'A+': return 'admin-grade-Aplus';
            case 'A':  return 'admin-grade-A';
            case 'A-': return 'admin-grade-Aminus';
            case 'B':  return 'admin-grade-B';
            case 'C':  return 'admin-grade-C';
            case 'D':  return 'admin-grade-D';
            case 'F':  return 'admin-grade-F';
            default:   return 'admin-grade-NA';
          }
        }

        function toast(msg, kind) {
          var el = $('toast');
          if (!el) return;
          el.textContent = msg;
          el.className = 'admin-toast visible' + (kind ? ' admin-toast-' + kind : '');
          clearTimeout(toast._t);
          toast._t = setTimeout(function () { el.classList.remove('visible'); }, 3200);
        }

        // ---------------------------------------------------------------
        // Default-vote resolver (mirrors public.resolve_legislator_vote)
        // ---------------------------------------------------------------
        function defaultVoteFor(party, stance) {
          if (stance === 'anti') {
            if (party === 'R') return 'Y';
            if (party === 'D') return 'N';
            return 'NV';
          }
          if (stance === 'pro') {
            if (party === 'R') return 'N';
            if (party === 'D') return 'Y';
            return 'NV';
          }
          return 'NV';
        }

        function findException(legislatorId, rollCallId, chamber, district) {
          // exceptions key off (chamber, district, roll_call_id); also support
          // legislator_id if column exists, for forward-compat with future schema
          for (var i = 0; i < state.exceptions.length; i++) {
            var e = state.exceptions[i];
            if (e.roll_call_id === rollCallId &&
                e.chamber === chamber &&
                Number(e.district) === Number(district)) {
              return e;
            }
          }
          return null;
        }

        function resolveVote(legislator, rc) {
          if (!rc || rc.chamber !== legislator.chamber) return '-';
          var exc = findException(legislator.id, rc.id, legislator.chamber, legislator.district);
          if (exc) return { vote: exc.vote, exception: exc };
          return { vote: defaultVoteFor(legislator.party, rc.stance), exception: null };
        }

        // ---------------------------------------------------------------
        // Stats / filters / sort
        // ---------------------------------------------------------------
        function populateParty(rows) {
          var sel = $('filterParty');
          while (sel.options.length > 1) sel.remove(1);
          Array.from(new Set(rows.map(function (r) { return r.party; }).filter(Boolean)))
            .sort().forEach(function (p) {
              var opt = document.createElement('option');
              opt.value = p;
              opt.textContent = p === 'D' ? 'Democratic' : p === 'R' ? 'Republican' : p;
              sel.appendChild(opt);
            });
        }

        function publishState(r) {
          var snap = state.published[r.id];
          if (!snap) return 'unpub';
          var draft = state.computed[r.id];
          if (!draft) return 'clean';
          var same =
            Number(draft.total_score) === Number(snap.total_score) &&
            draft.grade === snap.grade &&
            Number(draft.floor_score) === Number(snap.floor_score) &&
            Number(draft.committee_score) === Number(snap.committee_score) &&
            Number(draft.sponsorship_score) === Number(snap.sponsorship_score);
          return same ? 'clean' : 'dirty';
        }

        function renderStats() {
          $('statTotal').textContent  = state.rows.length.toLocaleString();
          $('statHouse').textContent  = state.rows.filter(function (r) { return r.chamber === 'house'; }).length;
          $('statSenate').textContent = state.rows.filter(function (r) { return r.chamber === 'senate'; }).length;
          $('statGraded').textContent = state.rows.filter(function (r) { return r.grade; }).length;

          var unpubCount = state.rows.filter(function (r) {
            var st = publishState(r);
            return st === 'dirty' || st === 'unpub';
          }).length;
          $('statUnpub').textContent = unpubCount;

          var banner = $('publishBanner');
          if (unpubCount > 0 && state.canWrite) {
            $('publishBannerCount').textContent = unpubCount;
            banner.hidden = false;
          } else {
            banner.hidden = true;
          }
        }

        function applyFilters() {
          var q = $('filterSearch').value.trim().toLowerCase();
          var chamber = $('filterChamber').value;
          var party = $('filterParty').value;
          var grade = $('filterGrade').value;
          var pub = $('filterPublish').value;

          state.filtered = state.rows.filter(function (r) {
            if (chamber && r.chamber !== chamber) return false;
            if (party && r.party !== party) return false;
            if (grade === 'NA' && r.grade) return false;
            if (grade && grade !== 'NA') {
              var letter = (r.grade || '').charAt(0).toUpperCase();
              if (letter !== grade) return false;
            }
            if (pub && publishState(r) !== pub) return false;
            if (q) {
              var hay = (
                (r.full_name || '') + ' ' +
                (r.first_name || '') + ' ' +
                (r.last_name || '') + ' ' +
                'district ' + (r.district || '') + ' ' +
                (r.leadership_role || '')
              ).toLowerCase();
              if (hay.indexOf(q) === -1) return false;
            }
            return true;
          });
          applySort();
        }

        function applySort() {
          var key = state.sortKey;
          var dir = state.sortDir === 'asc' ? 1 : -1;
          state.filtered.sort(function (a, b) {
            var av = a[key], bv = b[key];
            if (key === 'district' || key === 'score') {
              var an = av == null || av === '' ? -Infinity : Number(av);
              var bn = bv == null || bv === '' ? -Infinity : Number(bv);
              return (an - bn) * dir;
            }
            if (key === 'grade') {
              return ((GRADE_RANK[av] || 0) - (GRADE_RANK[bv] || 0)) * dir;
            }
            return String(av || '').localeCompare(String(bv || ''), undefined, { sensitivity: 'base' }) * dir;
          });
          renderRows();
          renderSortHeaders();
        }

        function renderSortHeaders() {
          var ths = document.querySelectorAll('#legTable thead th[data-sort]');
          for (var i = 0; i < ths.length; i++) {
            ths[i].classList.remove('admin-sort-asc', 'admin-sort-desc');
            if (ths[i].dataset.sort === state.sortKey) {
              ths[i].classList.add(state.sortDir === 'asc' ? 'admin-sort-asc' : 'admin-sort-desc');
            }
          }
        }

        // ---------------------------------------------------------------
        // Detail row (the editor for one legislator)
        // ---------------------------------------------------------------
        function rollCallsForChamberAndStages(chamber, stages) {
          return state.rollCalls
            .filter(function (rc) { return rc.chamber === chamber && stages.indexOf(rc.stage) !== -1; })
            .sort(function (a, b) {
              return new Date(b.vote_date || 0) - new Date(a.vote_date || 0);
            });
        }

        function votesSectionHtml(legislator, stages, sectionTitle, sectionKey) {
          var rcs = rollCallsForChamberAndStages(legislator.chamber, stages);
          if (rcs.length === 0) {
            return (
              '<div class="admin-detail-section-title">' + escapeHtml(sectionTitle) +
                (state.canWrite
                  ? '<button type="button" class="sc-pill-action" data-add-vote="' +
                      escapeHtml(legislator.id) + '" data-stages="' + sectionKey + '">+ Add vote</button>'
                  : '') +
              '</div>' +
              '<p class="sc-no-data">No ' + sectionTitle.toLowerCase() + ' recorded yet.</p>'
            );
          }

          var rows = '';
          for (var i = 0; i < rcs.length; i++) {
            var rc = rcs[i];
            var resolution = resolveVote(legislator, rc);
            var v = (typeof resolution === 'string') ? resolution : resolution.vote;
            var isExc = !(typeof resolution === 'string') && resolution.exception;
            var deflt = defaultVoteFor(legislator.party, rc.stance);

            var voteCell;
            if (state.canWrite) {
              voteCell = '';
              ['Y','N','NV','E'].forEach(function (opt) {
                var active = opt === v;
                voteCell +=
                  '<button type="button" class="sc-vote-btn' + (active ? ' is-active' : '') + '" ' +
                  'data-set-vote="' + escapeHtml(rc.id) + '" data-vote="' + opt + '" ' +
                  'data-leg="' + escapeHtml(legislator.id) + '">' + opt + '</button>';
              });
              voteCell +=
                '<button type="button" class="sc-vote-btn" data-set-vote="' +
                  escapeHtml(rc.id) + '" data-vote="" ' +
                  'data-leg="' + escapeHtml(legislator.id) + '" title="Revert to party-line default (' + deflt + ')">' +
                  '&times;</button>';
              if (isExc) {
                voteCell += '<span class="sc-vote-exception-marker" title="Hand-recorded exception">&#9679;</span>';
              }
            } else {
              voteCell =
                '<span class="sc-vote-pill sc-vote-' + escapeHtml(v) + '">' + escapeHtml(v) + '</span>' +
                (isExc ? '<span class="sc-vote-exception-marker" title="Hand-recorded exception">&#9679;</span>'
                       : '<span class="sc-vote-default" title="Party-line default">&nbsp;(default)</span>');
            }

            rows +=
              '<tr>' +
                '<td><strong>' + escapeHtml(rc.bill_label || rc.bill_slug || '') + '</strong> ' +
                  '<span class="admin-muted">&middot; ' + escapeHtml(rc.bill_title || '') + '</span></td>' +
                '<td>' + escapeHtml(STAGE_LABEL[rc.stage] || rc.stage) + '</td>' +
                '<td>' + escapeHtml(fmtDate(rc.vote_date)) + '</td>' +
                '<td>' + escapeHtml(rc.result || '') + '</td>' +
                '<td>' + voteCell + '</td>' +
              '</tr>';
          }

          return (
            '<div class="admin-detail-section-title">' + escapeHtml(sectionTitle) +
              ' <span class="admin-muted" style="font-weight:500">(' + rcs.length + ')</span>' +
              (state.canWrite
                ? '<button type="button" class="sc-pill-action" data-add-vote="' +
                    escapeHtml(legislator.id) + '" data-stages="' + sectionKey + '">+ Add vote</button>'
                : '') +
            '</div>' +
            '<table class="sc-votes-table">' +
              '<thead><tr>' +
                '<th>Bill</th><th>Stage</th><th>Date</th><th>Tally</th>' +
                '<th>' + escapeHtml(legislator.full_name) + '&rsquo;s vote</th>' +
              '</tr></thead>' +
              '<tbody>' + rows + '</tbody>' +
            '</table>'
          );
        }

        function sponsorshipsSectionHtml(legislator) {
          var current = {};
          state.sponsorships.forEach(function (s) {
            if (s.legislator_id === legislator.id) current[s.bill_slug] = s.role;
          });
          var bills = state.bills.slice().sort(function (a, b) {
            return (a.display_order || 999) - (b.display_order || 999);
          });

          var rows = '';
          bills.forEach(function (b) {
            var role = current[b.slug] || '';
            var roleSelect;
            if (state.canWrite) {
              roleSelect =
                '<select class="sc-sponsorship-role-select" ' +
                'data-set-sponsorship="' + escapeHtml(legislator.id) + '" ' +
                'data-bill="' + escapeHtml(b.slug) + '">' +
                '<option value=""'        + (role === ''        ? ' selected' : '') + '>&mdash;</option>' +
                '<option value="primary"' + (role === 'primary' ? ' selected' : '') + '>Primary</option>' +
                '<option value="co"'      + (role === 'co'      ? ' selected' : '') + '>Co-sponsor</option>' +
                '</select>';
            } else {
              roleSelect = role
                ? '<span class="admin-pill">' + escapeHtml(titleCase(role)) + '</span>'
                : '<span class="admin-muted">&mdash;</span>';
            }
            rows +=
              '<div class="sc-sponsorship-row">' +
                '<span class="sc-bill-label">' + escapeHtml(b.label) + '</span> ' +
                '<span class="admin-muted" style="flex:2">' + escapeHtml(b.title) +
                  ' <em>(' + escapeHtml(b.stance) + ')</em></span>' +
                roleSelect +
              '</div>';
          });

          return (
            '<div class="admin-detail-section-title">Sponsorships</div>' +
            (rows ? rows : '<p class="sc-no-data">No bills in the catalog.</p>')
          );
        }

        function scoreCompareHtml(legislator) {
          var draft = state.computed[legislator.id];
          var snap  = state.published[legislator.id];
          function cell(label, val) {
            return '<div><span class="sc-label">' + escapeHtml(label) + '</span>' +
                   '<span class="sc-value">' + (val == null ? '&mdash;' : escapeHtml(String(val))) + '</span></div>';
          }
          function gradePill(g) {
            if (!g) return '<span class="admin-grade admin-grade-NA">NA</span>';
            return '<span class="admin-grade ' + gradeClass(g) + '">' + escapeHtml(g) + '</span>';
          }

          var diffNote = '';
          if (draft && snap) {
            if (Number(draft.total_score) !== Number(snap.total_score) || draft.grade !== snap.grade) {
              diffNote =
                '<span class="sc-changed-arrow">Draft &ne; published</span>';
            } else {
              diffNote = '<span class="admin-muted">Up to date</span>';
            }
          } else if (draft && !snap) {
            diffNote = '<span class="sc-changed-arrow">Never published</span>';
          }

          return (
            '<div class="sc-score-compare">' +
              '<div><span class="sc-label">Draft (live)</span>' +
                '<span class="sc-value">' + (draft ? draft.total_score : '&mdash;') + ' ' +
                  gradePill(draft ? draft.grade : null) + '</span>' +
                (draft
                  ? '<span class="sc-value-sub">F:' + fmtScore(draft.floor_score) +
                      ' &middot; C:' + fmtScore(draft.committee_score) +
                      ' &middot; S:' + fmtScore(draft.sponsorship_score) + '</span>'
                  : '<span class="sc-value-sub">No evidence yet.</span>') +
              '</div>' +
              '<div><span class="sc-label">Published (live site)</span>' +
                '<span class="sc-value">' + (snap ? snap.total_score : '&mdash;') + ' ' +
                  gradePill(snap ? snap.grade : null) + '</span>' +
                (snap
                  ? '<span class="sc-value-sub">' + fmtDate(snap.snapshot_at) +
                      (snap.published_by ? ' by ' + escapeHtml(snap.published_by) : '') + '</span>'
                  : '<span class="sc-value-sub">Never published.</span>') +
              '</div>' +
              '<div style="justify-content:center;display:flex;align-items:center;font-weight:700">' +
                diffNote +
              '</div>' +
            '</div>'
          );
        }

        function detailRowHtml(r) {
          var ident = [
            ['Full Name', r.full_name],
            ['Chamber', titleCase(r.chamber)],
            ['Party', r.party],
            ['District', r.district],
            ['Leadership Role', r.leadership_role],
            ['Term', [r.term_start_year, r.term_end_year].filter(Boolean).join(' – ')],
            ['Email', r.contact_email],
            ['Phone', r.contact_phone]
          ];

          var identHtml = '<dl class="admin-detail-grid">';
          for (var i = 0; i < ident.length; i++) {
            var v = ident[i][1];
            if (v === '' || v == null) continue;
            identHtml +=
              '<div><dt>' + escapeHtml(ident[i][0]) + '</dt>' +
              '<dd>' + escapeHtml(String(v)) + '</dd></div>';
          }
          identHtml += '</dl>';

          var actions =
            '<div class="sc-action-row">' +
              (state.canWrite
                ? '<button type="button" class="sc-pill-action sc-pill-action-publish" ' +
                    'data-publish-leg="' + escapeHtml(r.id) + '">Publish this legislator</button>'
                : '') +
              (r.statehouse_url
                ? '<a class="sc-pill-action" target="_blank" rel="noopener" href="' +
                    escapeHtml(r.statehouse_url) + '">Official page &rarr;</a>'
                : '') +
              (r.official_url && r.official_url !== r.statehouse_url
                ? '<a class="sc-pill-action" target="_blank" rel="noopener" href="' +
                    escapeHtml(r.official_url) + '">Statehouse profile &rarr;</a>'
                : '') +
            '</div>';

          return '<tr class="admin-detail-row" data-detail-for="' + escapeHtml(r.id) + '">' +
                   '<td colspan="' + COLSPAN + '">' +
                     '<div class="admin-detail-section-title">Member</div>' + identHtml +
                     scoreCompareHtml(r) +
                     votesSectionHtml(r, FLOOR_STAGES, 'Floor votes', 'floor') +
                     votesSectionHtml(r, CMTE_STAGES, 'Committee votes', 'committee') +
                     sponsorshipsSectionHtml(r) +
                     actions +
                   '</td></tr>';
        }

        // ---------------------------------------------------------------
        // Table render
        // ---------------------------------------------------------------
        function renderRows() {
          var body = $('legBody');
          $('resultCount').textContent =
            state.filtered.length === state.rows.length
              ? state.rows.length + ' total'
              : state.filtered.length + ' of ' + state.rows.length;

          if (state.filtered.length === 0) {
            var msg = state.rows.length === 0
              ? 'No legislators found.'
              : 'No legislators match the current filters.';
            body.innerHTML = '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row">' + msg + '</td></tr>';
            return;
          }

          var html = '';
          for (var i = 0; i < state.filtered.length; i++) {
            var r = state.filtered[i];
            var isExpanded = !!state.expanded[r.id];
            var expandBtn =
              '<button type="button" class="admin-expand-btn" data-expand="' + escapeHtml(r.id) + '" ' +
                'aria-expanded="' + (isExpanded ? 'true' : 'false') + '">' +
                (isExpanded ? '&minus;' : '+') + '</button>';
            var draft = state.computed[r.id];
            var snap  = state.published[r.id];

            var grade = (snap && snap.grade) || (draft && draft.grade) || r.grade || '';
            var gradeCell = '<span class="admin-grade ' + gradeClass(grade) + '">' +
              escapeHtml(grade || 'NA') + '</span>';
            var score = (snap && snap.total_score) != null
              ? snap.total_score
              : (draft && draft.total_score) != null ? draft.total_score : null;
            var scoreCell = score == null
              ? '<span class="admin-muted">&mdash;</span>'
              : escapeHtml(String(score));
            var partyCell = r.party
              ? '<span class="admin-party-' + escapeHtml(r.party) + '">' + escapeHtml(r.party) + '</span>'
              : '<span class="admin-muted">&mdash;</span>';

            var st = publishState(r);
            var stPill;
            if (st === 'clean') {
              stPill = '<span class="sc-status sc-status-clean">Published</span>';
            } else if (st === 'dirty') {
              stPill = '<span class="sc-status sc-status-dirty">Draft changes</span>';
            } else {
              stPill = '<span class="sc-status sc-status-unpub">Never published</span>';
            }

            var contact = [];
            if (r.contact_email) {
              contact.push('<a class="admin-link" href="mailto:' + escapeHtml(r.contact_email) + '">Email</a>');
            }
            if (r.statehouse_url) {
              contact.push('<a class="admin-link" target="_blank" rel="noopener" href="' +
                escapeHtml(r.statehouse_url) + '">Page</a>');
            }
            var contactCell = contact.length ? contact.join(' &middot; ') : '<span class="admin-muted">&mdash;</span>';

            // remember last grade/score for sort
            r.grade = grade || null;
            r.score = score;

            html +=
              '<tr data-id="' + escapeHtml(r.id) + '">' +
                '<td class="admin-toggle-col">' + expandBtn + '</td>' +
                '<td class="admin-cell-name">' + escapeHtml(r.full_name || '') + '</td>' +
                '<td>' + escapeHtml(titleCase(r.chamber)) + '</td>' +
                '<td>' + partyCell + '</td>' +
                '<td class="admin-num">' + escapeHtml(String(r.district == null ? '' : r.district)) + '</td>' +
                '<td>' + gradeCell + '</td>' +
                '<td class="admin-num">' + scoreCell + '</td>' +
                '<td>' + stPill + '</td>' +
                '<td class="admin-cell-tight">' + contactCell + '</td>' +
              '</tr>';

            if (isExpanded) html += detailRowHtml(r);
          }
          body.innerHTML = html;
        }

        // ---------------------------------------------------------------
        // Data loading
        // ---------------------------------------------------------------
        function loadAll(client) {
          return Promise.all([
            client.from('legislators').select('*').order('chamber', { ascending: true }).order('district', { ascending: true }),
            client.from('bills').select('id, slug, label, title, stance, ga, status, summary, display_order, is_active'),
            client.from('roll_calls').select('id, roll_call_slug, bill_id, bill_slug, bill_label, bill_title, chamber, stage, label, vote_date, result, yeas, nays, stance, ga, notes'),
            client.from('legislator_vote_exceptions').select('*'),
            client.from('legislator_sponsorships').select('legislator_id, bill_slug, role'),
            client.from('score_snapshots').select('*').eq('is_current', true),
          ]).then(function (results) {
            var errs = results.map(function (r) { return r.error; }).filter(Boolean);
            if (errs.length) {
              // legislators is required; if everything failed, throw
              if (results[0].error) throw results[0].error;
              // otherwise warn but proceed
              console.warn('admin/legislators: partial load errors', errs);
            }
            state.rows         = results[0].data || [];
            state.bills        = (results[1].data || []).filter(function (b) { return b.is_active !== false; });
            state.rollCalls    = results[2].data || [];
            state.exceptions   = results[3].data || [];
            state.sponsorships = results[4].data || [];
            (results[5].data || []).forEach(function (s) { state.published[s.legislator_id] = s; });
            return state.rows;
          });
        }

        function recomputeFor(client, legislatorId) {
          return client.rpc('compute_legislator_scorecard', { p_legislator_id: legislatorId })
            .then(function (r) {
              if (r.error) throw r.error;
              var row = (r.data || [])[0];
              if (row) state.computed[legislatorId] = row;
              return row;
            });
        }

        function recomputeAll(client) {
          // Fan out so all expand-states have a draft handy.
          // For large rosters, only recompute legislators with any underlying
          // signal (any roll call in their chamber or any sponsorship).
          var ids = state.rows.map(function (r) { return r.id; });
          var promises = ids.map(function (id) { return recomputeFor(client, id).catch(function () { return null; }); });
          return Promise.all(promises);
        }

        // ---------------------------------------------------------------
        // Edits
        // ---------------------------------------------------------------
        function setVote(client, legislator, rollCallId, voteValue) {
          // voteValue: 'Y' | 'N' | 'NV' | 'E' | '' (revert to party-line)
          var rc = state.rollCalls.find(function (x) { return x.id === rollCallId; });
          if (!rc) return Promise.reject(new Error('roll call not found'));

          if (!voteValue) {
            // Delete exception row, revert to party-line
            return client
              .from('legislator_vote_exceptions')
              .delete()
              .eq('roll_call_id', rollCallId)
              .eq('chamber', legislator.chamber)
              .eq('district', legislator.district)
              .then(function (resp) {
                if (resp.error) throw resp.error;
                state.exceptions = state.exceptions.filter(function (e) {
                  return !(e.roll_call_id === rollCallId && e.chamber === legislator.chamber &&
                           Number(e.district) === Number(legislator.district));
                });
              });
          }

          // Upsert exception
          return client
            .from('legislator_vote_exceptions')
            .upsert(
              {
                roll_call_id: rollCallId,
                roll_call_slug: rc.roll_call_slug,
                chamber: legislator.chamber,
                district: legislator.district,
                vote: voteValue,
              },
              { onConflict: 'chamber,district,roll_call_id' }
            )
            .select()
            .single()
            .then(function (resp) {
              if (resp.error) throw resp.error;
              // refresh local cache
              var found = false;
              for (var i = 0; i < state.exceptions.length; i++) {
                if (state.exceptions[i].roll_call_id === rollCallId &&
                    state.exceptions[i].chamber === legislator.chamber &&
                    Number(state.exceptions[i].district) === Number(legislator.district)) {
                  state.exceptions[i] = resp.data;
                  found = true;
                  break;
                }
              }
              if (!found) state.exceptions.push(resp.data);
            });
        }

        function setSponsorship(client, legislator, billSlug, role) {
          var idx = -1;
          for (var i = 0; i < state.sponsorships.length; i++) {
            var s = state.sponsorships[i];
            if (s.legislator_id === legislator.id && s.bill_slug === billSlug) { idx = i; break; }
          }
          if (!role) {
            return client
              .from('legislator_sponsorships')
              .delete()
              .eq('legislator_id', legislator.id)
              .eq('bill_slug', billSlug)
              .then(function (resp) {
                if (resp.error) throw resp.error;
                if (idx !== -1) state.sponsorships.splice(idx, 1);
              });
          }
          return client
            .from('legislator_sponsorships')
            .upsert(
              { legislator_id: legislator.id, bill_slug: billSlug, role: role },
              { onConflict: 'legislator_id,bill_slug' }
            )
            .select()
            .single()
            .then(function (resp) {
              if (resp.error) throw resp.error;
              if (idx !== -1) state.sponsorships[idx] = resp.data;
              else state.sponsorships.push(resp.data);
            });
        }

        function addRollCall(client, payload, memberVote, memberNote, legislator) {
          // Build a slug if not provided
          var stageSuffix = payload.stage;
          var chamberLetter = payload.chamber === 'house' ? 'h' : 's';
          var slug = payload.bill_slug + '-' + chamberLetter + '-' + stageSuffix;
          // ensure unique: if exists, append timestamp
          if (state.rollCalls.some(function (rc) { return rc.roll_call_slug === slug; })) {
            slug = slug + '-' + Date.now();
          }
          var bill = state.bills.find(function (b) { return b.slug === payload.bill_slug; });
          if (!bill) return Promise.reject(new Error('bill not found'));

          var insertPayload = {
            roll_call_slug: slug,
            bill_id: bill.id,
            bill_slug: bill.slug,
            bill_label: bill.label,
            bill_title: bill.title,
            chamber: payload.chamber,
            stage: payload.stage,
            label: payload.label,
            vote_date: payload.vote_date,
            result: payload.result,
            yeas: Number(payload.yeas) || 0,
            nays: Number(payload.nays) || 0,
            stance: bill.stance,
            ga: bill.ga,
            notes: payload.notes || null,
          };

          return client.from('roll_calls').insert(insertPayload).select().single()
            .then(function (resp) {
              if (resp.error) throw resp.error;
              state.rollCalls.push(resp.data);
              if (!memberVote) return resp.data;
              return client.from('legislator_vote_exceptions')
                .insert({
                  roll_call_id: resp.data.id,
                  roll_call_slug: resp.data.roll_call_slug,
                  chamber: legislator.chamber,
                  district: legislator.district,
                  vote: memberVote,
                  notes: memberNote || null,
                })
                .select()
                .single()
                .then(function (excResp) {
                  if (excResp.error) throw excResp.error;
                  state.exceptions.push(excResp.data);
                  return resp.data;
                });
            });
        }

        function publishLegislator(client, legislatorId) {
          return client.rpc('publish_scorecard', { p_legislator_id: legislatorId })
            .then(function (r) {
              if (r.error) throw r.error;
              if (r.data) state.published[legislatorId] = r.data;
              return r.data;
            });
        }

        function publishAll(client) {
          return client.rpc('publish_scorecard_all', {})
            .then(function (r) {
              if (r.error) throw r.error;
              return r.data;
            });
        }

        // ---------------------------------------------------------------
        // Vote modal
        // ---------------------------------------------------------------
        function openVoteModal(legislator, stagesHint) {
          state.voteContext = { legislator_id: legislator.id, chamber: legislator.chamber };
          var sel = $('voteBill');
          sel.innerHTML = '';
          state.bills.slice().sort(function (a, b) {
            return (a.display_order || 999) - (b.display_order || 999);
          }).forEach(function (b) {
            var opt = document.createElement('option');
            opt.value = b.slug;
            opt.textContent = b.label + ' — ' + b.title + ' (' + b.stance + ')';
            sel.appendChild(opt);
          });
          $('voteChamber').value = legislator.chamber;
          $('voteStage').value = stagesHint === 'committee' ? 'committee' : 'pass';
          $('voteDate').value = new Date().toISOString().slice(0, 10);
          $('voteLabel').value = '';
          $('voteYeas').value = 0;
          $('voteNays').value = 0;
          $('voteResult').value = '';
          $('voteMemberVote').value = '';
          $('voteMemberNote').value = '';
          $('voteNotes').value = '';
          $('voteDrawerTitle').textContent =
            'Add ' + (stagesHint === 'committee' ? 'committee' : 'floor') +
            ' vote for ' + legislator.full_name;
          var d = $('voteDrawer');
          d.classList.add('is-open');
          d.setAttribute('aria-hidden', 'false');
        }

        function closeVoteModal() {
          var d = $('voteDrawer');
          if (!d) return;
          d.classList.remove('is-open');
          d.setAttribute('aria-hidden', 'true');
          state.voteContext = null;
        }

        // ---------------------------------------------------------------
        // Boot
        // ---------------------------------------------------------------
        document.addEventListener('admin-shell-ready', function (e) {
          var client = e.detail && e.detail.client;
          if (!client) return;
          var can = (e.detail && e.detail.can) || function () { return false; };
          state.canWrite = !!can('legislators', 'write');

          var shellBody = document.getElementById('shellBody');
          if (shellBody && !document.getElementById('legTable')) {
            shellBody.appendChild(document.getElementById('legTpl').content.cloneNode(true));
          }

          if (!state.canWrite) {
            var banner = document.createElement('div');
            banner.className = 'sc-publish-banner';
            banner.style.background = '#eef2f6';
            banner.style.borderColor = '#cfd5dd';
            banner.innerHTML =
              '<span>Read-only access. Ask the Director for the <strong>legislative_lead</strong> role to edit votes and publish.</span>';
            var shellBodyEl = document.getElementById('shellBody');
            shellBodyEl.insertBefore(banner, shellBodyEl.firstChild);
          }

          loadAll(client)
            .then(function () {
              populateParty(state.rows);
              return recomputeAll(client);
            })
            .then(function () {
              renderStats();
              applyFilters();
            })
            .catch(function (err) {
              console.error('Failed to load legislators:', err);
              $('legBody').innerHTML =
                '<tr><td colspan="' + COLSPAN + '" class="admin-empty-row admin-error">' +
                'Could not load legislators: ' + escapeHtml(err.message || 'unknown error') +
                '</td></tr>';
            });

          // -------------------------------------------------------------
          // Filter wiring
          // -------------------------------------------------------------
          var debounceT;
          $('filterSearch').addEventListener('input', function () {
            clearTimeout(debounceT);
            debounceT = setTimeout(applyFilters, 150);
          });
          ['filterChamber', 'filterParty', 'filterGrade', 'filterPublish'].forEach(function (id) {
            $(id).addEventListener('change', applyFilters);
          });

          var ths = document.querySelectorAll('#legTable thead th[data-sort]');
          for (var i = 0; i < ths.length; i++) {
            ths[i].addEventListener('click', function (ev) {
              var key = ev.currentTarget.dataset.sort;
              if (state.sortKey === key) {
                state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
              } else {
                state.sortKey = key;
                state.sortDir = (key === 'score' || key === 'grade') ? 'desc' : 'asc';
              }
              applySort();
            });
          }

          // -------------------------------------------------------------
          // Table body event delegation
          // -------------------------------------------------------------
          $('legBody').addEventListener('click', function (ev) {
            var t = ev.target;

            // Expand toggle
            var btn = t.closest && t.closest('[data-expand]');
            if (btn) {
              ev.preventDefault();
              var id = btn.dataset.expand;
              state.expanded[id] = !state.expanded[id];
              renderRows();
              return;
            }

            // Add vote
            var addBtn = t.closest && t.closest('[data-add-vote]');
            if (addBtn) {
              if (!state.canWrite) { toast('Read-only — needs legislators:write', 'err'); return; }
              var leg = state.rows.find(function (r) { return r.id === addBtn.dataset.addVote; });
              if (leg) openVoteModal(leg, addBtn.dataset.stages);
              return;
            }

            // Set vote on existing roll call
            var setBtn = t.closest && t.closest('[data-set-vote]');
            if (setBtn) {
              if (!state.canWrite) { toast('Read-only — needs legislators:write', 'err'); return; }
              var legId = setBtn.dataset.leg;
              var leg2 = state.rows.find(function (r) { return r.id === legId; });
              if (!leg2) return;
              var rcId = setBtn.dataset.setVote;
              var v    = setBtn.dataset.vote;
              setBtn.disabled = true;
              setVote(client, leg2, rcId, v)
                .then(function () { return recomputeFor(client, leg2.id); })
                .then(function () {
                  renderStats();
                  renderRows();
                  toast(v ? 'Recorded ' + v + ' for ' + leg2.full_name : 'Reverted to party-line', 'ok');
                })
                .catch(function (err) {
                  console.error(err);
                  toast('Save failed: ' + (err.message || 'unknown'), 'err');
                })
                .then(function () { setBtn.disabled = false; });
              return;
            }

            // Publish single legislator
            var pubBtn = t.closest && t.closest('[data-publish-leg]');
            if (pubBtn) {
              if (!state.canWrite) { toast('Read-only', 'err'); return; }
              var legId2 = pubBtn.dataset.publishLeg;
              var leg3   = state.rows.find(function (r) { return r.id === legId2; });
              pubBtn.disabled = true;
              pubBtn.textContent = 'Publishing…';
              publishLegislator(client, legId2)
                .then(function () { return recomputeFor(client, legId2); })
                .then(function () {
                  renderStats();
                  renderRows();
                  toast('Published ' + (leg3 ? leg3.full_name : legId2), 'ok');
                })
                .catch(function (err) {
                  console.error(err);
                  toast('Publish failed: ' + (err.message || 'unknown'), 'err');
                })
                .then(function () {
                  pubBtn.disabled = false;
                  pubBtn.textContent = 'Publish this legislator';
                });
              return;
            }
          });

          // Sponsorship select changes (separate listener for change events)
          $('legBody').addEventListener('change', function (ev) {
            var sel = ev.target.closest && ev.target.closest('[data-set-sponsorship]');
            if (!sel) return;
            if (!state.canWrite) { toast('Read-only', 'err'); return; }
            var legId = sel.dataset.setSponsorship;
            var leg   = state.rows.find(function (r) { return r.id === legId; });
            if (!leg) return;
            var billSlug = sel.dataset.bill;
            var role = sel.value;
            sel.disabled = true;
            setSponsorship(client, leg, billSlug, role)
              .then(function () { return recomputeFor(client, leg.id); })
              .then(function () {
                renderStats();
                renderRows();
                toast(role ? 'Saved sponsorship' : 'Removed sponsorship', 'ok');
              })
              .catch(function (err) {
                console.error(err);
                toast('Save failed: ' + (err.message || 'unknown'), 'err');
              })
              .then(function () { sel.disabled = false; });
          });

          // -------------------------------------------------------------
          // Vote modal events
          // -------------------------------------------------------------
          document.body.addEventListener('click', function (ev) {
            var t = ev.target;
            if (t.closest && t.closest('[data-vote-drawer-close]')) {
              ev.preventDefault();
              closeVoteModal();
            }
          });

          $('voteSaveBtn').addEventListener('click', function () {
            if (!state.voteContext) return;
            var ctx = state.voteContext;
            var legislator = state.rows.find(function (r) { return r.id === ctx.legislator_id; });
            if (!legislator) return;

            var payload = {
              bill_slug: $('voteBill').value,
              stage:     $('voteStage').value,
              chamber:   $('voteChamber').value,
              vote_date: $('voteDate').value,
              label:     $('voteLabel').value.trim(),
              yeas:      $('voteYeas').value,
              nays:      $('voteNays').value,
              result:    $('voteResult').value.trim(),
              notes:     $('voteNotes').value.trim(),
            };
            if (!payload.bill_slug || !payload.stage || !payload.chamber ||
                !payload.vote_date || !payload.label || !payload.result) {
              toast('Fill out the required fields', 'err');
              return;
            }
            var memberVote = $('voteMemberVote').value || '';
            var memberNote = $('voteMemberNote').value.trim();

            $('voteSaveBtn').disabled = true;
            $('voteSaveBtn').textContent = 'Saving…';
            addRollCall(client, payload, memberVote, memberNote, legislator)
              .then(function () { return recomputeFor(client, legislator.id); })
              .then(function () {
                closeVoteModal();
                renderStats();
                renderRows();
                toast('Saved roll call', 'ok');
              })
              .catch(function (err) {
                console.error(err);
                toast('Save failed: ' + (err.message || 'unknown'), 'err');
              })
              .then(function () {
                $('voteSaveBtn').disabled = false;
                $('voteSaveBtn').textContent = 'Save vote';
              });
          });

          // -------------------------------------------------------------
          // Top-level publish-all
          // -------------------------------------------------------------
          $('publishAllBtn').addEventListener('click', function () {
            if (!state.canWrite) return;
            var btn = $('publishAllBtn');
            if (!window.confirm('Publish all current draft changes to the public /scorecard?')) return;
            btn.disabled = true;
            btn.textContent = 'Publishing…';
            publishAll(client)
              .then(function (count) {
                // Re-load snapshots so the UI reflects the new published state
                return client.from('score_snapshots').select('*').eq('is_current', true)
                  .then(function (resp) {
                    if (!resp.error) {
                      state.published = Object.create(null);
                      (resp.data || []).forEach(function (s) { state.published[s.legislator_id] = s; });
                    }
                    return count;
                  });
              })
              .then(function (count) {
                renderStats();
                renderRows();
                toast('Published ' + (count || 'all') + ' legislators', 'ok');
              })
              .catch(function (err) {
                console.error(err);
                toast('Publish failed: ' + (err.message || 'unknown'), 'err');
              })
              .then(function () {
                btn.disabled = false;
                btn.textContent = 'Publish all changes';
              });
          });
        });
      })();
    </script>
    <script src="/admin/admin-responsive.js" defer></script>
  </body>
