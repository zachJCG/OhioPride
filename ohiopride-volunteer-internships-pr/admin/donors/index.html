<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donors | Ohio Pride PAC Admin</title>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/site-template.css" />
    <link rel="stylesheet" href="/admin/admin-shared.css" />
    <link rel="stylesheet" href="/admin/admin-shell.css" />

    <style>
      .donors-table-wrap { background: rgba(15, 34, 51, 0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 16px 8px; }
      .donors-table tbody tr { cursor: pointer; }
      .donors-table tbody tr:hover { background: rgba(115, 215, 238, 0.06); }
      .admin-pill-tier { background: rgba(115, 215, 238, 0.12); color: var(--color-light-blue); border: 1px solid rgba(115, 215, 238, 0.3); }
    </style>
  </head>

  <body class="admin-shell">
    <div
      id="shell-root"
      data-active-nav="donors"
      data-page-eyebrow="Money"
      data-page-title="Donors"
      data-page-sub="Founding members, ActBlue contributions, and tier progress."
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/admin-shell.js"></script>

    <script>
      (function () {
        'use strict';

        var TIER_ORDER = [
          'Founders Circle','Leadership','Champion','Advocate',
          'Stonewall Sustainer','Ally','Friend','Supporter'
        ];
        function tierFor(cents, recurrence) {
          if (recurrence === 'monthly' && cents >= 1969 && cents < 5000) return 'Stonewall Sustainer';
          if (cents >= 250000) return 'Founders Circle';
          if (cents >= 100000) return 'Leadership';
          if (cents >=  50000) return 'Champion';
          if (cents >=  25000) return 'Advocate';
          if (cents >=  10000) return 'Ally';
          if (cents >=   5000) return 'Friend';
          return 'Supporter';
        }

        var state = {
          rows: [], filtered: [],
          sortKey: 'founding_number', sortDir: 'asc',
          client: null, canWrite: false
        };

        document.addEventListener('admin-shell-ready', function (ev) {
          var detail = ev.detail || {};
          state.client = detail.client;
          state.canWrite = detail.can('donors','write');

          var actions = document.getElementById('shellPageActions');
          actions.innerHTML =
            '<a class="shell-btn shell-btn-outline" href="/founding-members" target="_blank" rel="noopener">View public roster</a>' +
            '<button type="button" class="shell-btn shell-btn-primary" id="exportCsv">Export CSV</button>';

          document.getElementById('shellBody').innerHTML = pageHtml();

          loadDonors().then(function (rows) {
            state.rows = rows;
            renderStats();
            applyFilters();
          }).catch(function (err) {
            console.error('donors load failed', err);
            document.getElementById('donorsBody').innerHTML =
              '<tr><td colspan="9" class="admin-empty-row admin-error">' +
              'Could not load donors. Your role may not include this module.' +
              '</td></tr>';
          });

          bindEvents();
        });

        function pageHtml() {
          return [
            '<div class="admin-stat-grid">',
              '<div class="admin-stat"><div class="admin-stat-num" id="statMembers">0</div><div class="admin-stat-label">Members</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statRaised">$0</div><div class="admin-stat-label">Total Raised</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statPublic">0</div><div class="admin-stat-label">On Public Roster</div></div>',
              '<div class="admin-stat"><div class="admin-stat-num" id="statProgress">0%</div><div class="admin-stat-label">Toward 1,969</div></div>',
            '</div>',

            '<div class="admin-toolbar">',
              '<input type="search" class="admin-input" id="filterSearch" placeholder="Search name, email, ActBlue id..." autocomplete="off" />',
              '<select class="admin-input" id="filterTier"><option value="">All tiers</option>',
                TIER_ORDER.map(function (k) { return '<option value="' + k + '">' + k + '</option>'; }).join(''),
              '</select>',
              '<select class="admin-input" id="filterPublic">',
                '<option value="">Public &amp; private</option>',
                '<option value="public">On public roster</option>',
                '<option value="private">Hidden from roster</option>',
              '</select>',
              '<select class="admin-input" id="filterVetted">',
                '<option value="">All vetting states</option>',
                '<option value="vetted">Vetted</option>',
                '<option value="unvetted">Awaiting vetting</option>',
              '</select>',
              '<span class="admin-toolbar-spacer"></span>',
              '<span class="admin-result-count" id="resultCount"></span>',
            '</div>',

            '<div class="donors-table-wrap">',
              '<div class="admin-table-wrap" style="border:none;">',
                '<table class="admin-table donors-table" id="donorsTable">',
                  '<thead><tr>',
                    '<th data-sort="founding_number" class="admin-sortable">#<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th data-sort="full_name" class="admin-sortable">Name<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>Email</th>',
                    '<th data-sort="amount_cents" class="admin-sortable admin-num">Amount<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>Tier</th>',
                    '<th data-sort="contributed_at" class="admin-sortable">Contributed<span class="admin-sort-arrow">&darr;</span></th>',
                    '<th>City / County</th>',
                    '<th class="admin-toggle-col">Public</th>',
                    '<th class="admin-toggle-col">Vetted</th>',
                  '</tr></thead>',
                  '<tbody id="donorsBody"><tr><td colspan="9" class="admin-empty-row">Loading donors...</td></tr></tbody>',
                '</table>',
              '</div>',
            '</div>'
          ].join('');
        }

        // ---------------------------------------------------------------
        function loadDonors() {
          return state.client
            .from('founding_members')
            .select(
              'id, full_name, display_name, email, amount_cents, recurrence, ' +
              'actblue_contribution_id, actblue_receipt_id, contributed_at, ' +
              'is_public, is_vetted, founding_number, city, county'
            )
            .order('founding_number', { ascending: true, nullsFirst: false })
            .then(function (resp) {
              if (resp.error) throw resp.error;
              var rows = resp.data || [];
              for (var i = 0; i < rows.length; i++) {
                rows[i]._tier = tierFor(rows[i].amount_cents, rows[i].recurrence);
              }
              return rows;
            });
        }
        function toggleField(id, field, value) {
          var update = {}; update[field] = value;
          return state.client.from('founding_members').update(update).eq('id', id)
            .then(function (r) { if (r.error) throw r.error; });
        }

        // ---------------------------------------------------------------
        function renderStats() {
          var totalMembers = state.rows.length;
          var totalCents = state.rows.reduce(function (s, r) { return s + (r.amount_cents || 0); }, 0);
          var publicCount = state.rows.filter(function (r) { return r.is_public && r.is_vetted; }).length;
          var goal = 1969;
          var pct = totalMembers > 0 ? Math.min(100, Math.round((totalMembers / goal) * 1000) / 10) : 0;

          $('statMembers').textContent  = totalMembers.toLocaleString();
          $('statRaised').textContent   = fmtMoney(totalCents);
          $('statPublic').textContent   = publicCount.toLocaleString();
          $('statProgress').textContent = pct + '%';
        }

        function applyFilters() {
          var q       = $('filterSearch').value.trim().toLowerCase();
          var tier    = $('filterTier').value;
          var pub     = $('filterPublic').value;
          var vet     = $('filterVetted').value;

          state.filtered = state.rows.filter(function (r) {
            if (tier && r._tier !== tier) return false;
            if (pub === 'public'  && !(r.is_public && r.is_vetted)) return false;
            if (pub === 'private' &&   r.is_public && r.is_vetted)  return false;
            if (vet === 'vetted'   && !r.is_vetted) return false;
            if (vet === 'unvetted' &&  r.is_vetted) return false;
            if (q) {
              var hay = ((r.full_name||'') + ' ' + (r.display_name||'') + ' ' +
                         (r.email||'') + ' ' + (r.actblue_receipt_id||'') + ' ' +
                         (r.actblue_contribution_id||'')).toLowerCase();
              if (hay.indexOf(q) === -1) return false;
            }
            return true;
          });
          applySort();
        }

        function applySort() {
          var key = state.sortKey, dir = state.sortDir === 'asc' ? 1 : -1;
          state.filtered.sort(function (a, b) {
            var av = a[key], bv = b[key];
            if (key === 'contributed_at') return ((new Date(av||0)) - (new Date(bv||0))) * dir;
            if (key === 'founding_number' || key === 'amount_cents') {
              var an = av == null ? Number.POSITIVE_INFINITY : Number(av);
              var bn = bv == null ? Number.POSITIVE_INFINITY : Number(bv);
              return (an - bn) * dir;
            }
            return String(av || '').localeCompare(String(bv || ''), undefined, { sensitivity:'base' }) * dir;
          });
          renderRows();
          renderSortHeaders();
        }
        function renderSortHeaders() {
          document.querySelectorAll('#donorsTable thead th[data-sort]').forEach(function (th) {
            th.classList.remove('admin-sort-asc','admin-sort-desc');
            if (th.dataset.sort === state.sortKey) {
              th.classList.add(state.sortDir === 'asc' ? 'admin-sort-asc' : 'admin-sort-desc');
            }
          });
        }

        function renderRows() {
          var body = $('donorsBody');
          $('resultCount').textContent =
            state.filtered.length === state.rows.length
              ? state.rows.length + ' total'
              : state.filtered.length + ' of ' + state.rows.length;

          if (state.filtered.length === 0) {
            var msg = state.rows.length === 0
              ? 'No founding members yet. ActBlue sync will populate this list as donations come in.'
              : 'No donors match the current filters.';
            body.innerHTML = '<tr><td colspan="9" class="admin-empty-row">' + msg + '</td></tr>';
            return;
          }

          body.innerHTML = state.filtered.map(function (r) {
            var nameMain = escapeHtml(r.full_name || '—');
            var displayLabel = r.display_name && r.display_name !== r.full_name
              ? '<span class="admin-cell-sub">Public: ' + escapeHtml(r.display_name) + '</span>'
              : '';
            var foundingNum = r.founding_number ? '#' + r.founding_number : '<span class="admin-muted">&mdash;</span>';
            var emailHtml = r.email
              ? '<a href="mailto:' + escapeAttr(r.email) + '" class="admin-link" onclick="event.stopPropagation()">' + escapeHtml(r.email) + '</a>'
              : '<span class="admin-muted">&mdash;</span>';
            var amount = fmtMoney(r.amount_cents);
            if (r.recurrence === 'monthly') amount += '<span class="admin-cell-sub">/mo</span>';
            var tierBadge = '<span class="admin-pill admin-pill-tier">' + escapeHtml(r._tier) + '</span>';
            var loc = [r.city, r.county ? r.county + ' Co.' : ''].filter(Boolean).join(', ');
            loc = loc ? escapeHtml(loc) : '<span class="admin-muted">&mdash;</span>';
            if (r.actblue_receipt_id) {
              loc += '<span class="admin-cell-sub">ActBlue ' + escapeHtml(r.actblue_receipt_id) + '</span>';
            }

            return '<tr data-id="' + escapeAttr(r.id) + '">' +
              '<td class="admin-num">' + foundingNum + '</td>' +
              '<td class="admin-cell-name">' + nameMain + displayLabel + '</td>' +
              '<td>' + emailHtml + '</td>' +
              '<td class="admin-num">' + amount + '</td>' +
              '<td>' + tierBadge + '</td>' +
              '<td>' + escapeHtml(fmtDate(r.contributed_at)) + '</td>' +
              '<td>' + loc + '</td>' +
              '<td class="admin-toggle-col">' + toggleHtml(r.id, 'is_public', r.is_public) + '</td>' +
              '<td class="admin-toggle-col">' + toggleHtml(r.id, 'is_vetted', r.is_vetted) + '</td>' +
            '</tr>';
          }).join('');
        }
        function toggleHtml(id, field, on) {
          var disabled = state.canWrite ? '' : ' disabled';
          return '<label class="admin-switch" onclick="event.stopPropagation()">' +
            '<input type="checkbox" data-toggle="' + field + '" data-id="' + escapeAttr(id) + '"' +
            (on ? ' checked' : '') + disabled + ' />' +
            '<span class="admin-switch-slider"></span>' +
          '</label>';
        }

        // ---------------------------------------------------------------
        function openDonorDrawer(r) {
          function row(label, value) {
            return '<dt>' + escapeHtml(label) + '</dt><dd>' + (value || '<span class="admin-muted">&mdash;</span>') + '</dd>';
          }
          function v(x) { return x ? escapeHtml(x) : ''; }

          var body =
            '<div class="shell-drawer-section"><h4>Identity</h4><dl>' +
              row('Founding number', r.founding_number ? '<strong>#' + r.founding_number + '</strong>' : '') +
              row('Full name',  v(r.full_name)) +
              row('Display name', v(r.display_name)) +
              row('Email', r.email ? '<a href="mailto:' + escapeAttr(r.email) + '">' + escapeHtml(r.email) + '</a>' : '') +
            '</dl></div>' +
            '<div class="shell-drawer-section"><h4>Contribution</h4><dl>' +
              row('Amount', '<strong>' + fmtMoney(r.amount_cents) + (r.recurrence === "monthly" ? "/mo" : "") + '</strong>') +
              row('Tier', '<span class="admin-pill admin-pill-tier">' + escapeHtml(r._tier) + '</span>') +
              row('Contributed', v(fmtDate(r.contributed_at))) +
              row('ActBlue receipt', v(r.actblue_receipt_id)) +
              row('ActBlue contribution', v(r.actblue_contribution_id)) +
            '</dl></div>' +
            '<div class="shell-drawer-section"><h4>Roster</h4><dl>' +
              row('On public roster', r.is_public ? 'Yes' : 'No') +
              row('Vetted', r.is_vetted ? 'Yes' : 'No') +
              row('Location', [r.city, r.county ? r.county + ' Co.' : ''].filter(Boolean).map(escapeHtml).join(', ')) +
            '</dl></div>';

          var foot = '<a class="shell-btn shell-btn-outline" href="mailto:' + escapeAttr(r.email || '') + '">Email donor</a>' +
            '<button type="button" class="shell-btn shell-btn-primary" data-drawer-close>Done</button>';

          window.AdminShell.openDrawer({
            eyebrow: r._tier,
            title: r.full_name || 'Donor',
            bodyHtml: body,
            footHtml: foot
          });
        }

        // ---------------------------------------------------------------
        function bindEvents() {
          var debT;
          $('filterSearch').addEventListener('input', function () { clearTimeout(debT); debT = setTimeout(applyFilters, 150); });
          $('filterTier').addEventListener('change',   applyFilters);
          $('filterPublic').addEventListener('change', applyFilters);
          $('filterVetted').addEventListener('change', applyFilters);

          document.querySelectorAll('#donorsTable thead th[data-sort]').forEach(function (th) {
            th.addEventListener('click', function (ev) {
              var key = ev.currentTarget.dataset.sort;
              if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
              else { state.sortKey = key; state.sortDir = key === 'contributed_at' || key === 'amount_cents' ? 'desc' : 'asc'; }
              applySort();
            });
          });

          var body = $('donorsBody');
          body.addEventListener('click', function (ev) {
            var tr  = ev.target.closest('tr[data-id]');
            if (!tr) return;
            var input = ev.target.closest('input,a,label');
            if (input) return;
            var id = tr.dataset.id;
            var row = state.rows.find(function (r) { return r.id === id; });
            if (row) openDonorDrawer(row);
          });
          body.addEventListener('change', function (ev) {
            var input = ev.target;
            if (!input || input.tagName !== 'INPUT' || !input.dataset.toggle) return;
            if (!state.canWrite) {
              window.AdminShell.toast('Your role does not include write access.', 'error');
              input.checked = !input.checked;
              return;
            }
            var id = input.dataset.id;
            var field = input.dataset.toggle;
            var value = input.checked;
            input.disabled = true;
            toggleField(id, field, value).then(function () {
              for (var i = 0; i < state.rows.length; i++) {
                if (state.rows[i].id === id) { state.rows[i][field] = value; break; }
              }
              renderStats();
              window.AdminShell.toast(
                (field === 'is_public' ? 'Public roster' : 'Vetting') + (value ? ' enabled.' : ' disabled.'),
                'success'
              );
            }).catch(function (err) {
              console.error('Toggle failed:', err);
              input.checked = !value;
              window.AdminShell.toast('Could not update. Please try again.', 'error');
            }).finally(function () { input.disabled = false; });
          });

          document.getElementById('exportCsv').addEventListener('click', exportCsv);
        }

        function exportCsv() {
          if (state.filtered.length === 0) {
            window.AdminShell.toast('Nothing to export with the current filters.', 'error');
            return;
          }
          var cols = ['founding_number','full_name','display_name','email','amount_cents','recurrence','_tier','contributed_at','city','county','is_public','is_vetted','actblue_receipt_id','actblue_contribution_id'];
          var lines = [cols.join(',')];
          state.filtered.forEach(function (r) {
            lines.push(cols.map(function (c) {
              var v = r[c];
              if (typeof v === 'boolean') v = v ? 'true' : 'false';
              if (v == null) v = '';
              v = String(v).replace(/"/g, '""');
              return /[,"\n]/.test(v) ? '"' + v + '"' : v;
            }).join(','));
          });
          var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'ohio-pride-donors-' + new Date().toISOString().slice(0,10) + '.csv';
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
          window.AdminShell.toast('Exported ' + state.filtered.length + ' donors.', 'success');
        }

        // Helpers
        function $(id) { return document.getElementById(id); }
        function fmtMoney(cents) {
          var dollars = (cents || 0) / 100;
          return dollars.toLocaleString('en-US', {
            style: 'currency', currency: 'USD',
            maximumFractionDigits: dollars % 1 === 0 ? 0 : 2
          });
        }
        function fmtDate(iso) {
          if (!iso) return '';
          var d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
          });
        }
        function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
      })();
    </script>
  </body>
</html>
