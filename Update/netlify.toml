[build]
  publish = "."

# Legacy redirects
[[redirects]]
  from = "/gala"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/sponsorship"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/priorities"
  to = "/"
  status = 301
  force = true

# Clean URLs for donate subpages
[[redirects]]
  from = "/donate/founding-member"
  to = "/donate/founding-member.html"
  status = 200

# Clean URLs for individual bill tracker pages
[[redirects]]
  from = "/issues/hb249"
  to = "/issues/hb249.html"
  status = 200

[[redirects]]
  from = "/issues/hb693"
  to = "/issues/hb693.html"
  status = 200

[[redirects]]
