# Ohio SOS CFOFS export config -- set per filing.
#
# entity / report are used in the OUTPUT FILENAMES ONLY. The entity number is
# never written into a PAC REGISTRATION NUMBER column -- CFOFS already knows the
# filer from the logged-in session.

entity: "16372"            # filing committee's SOS registration number
report: "PostPrimary2026"  # report label, e.g. PostPrimary2026, Annual2026
output_dir: "./out"        # where the three CSVs are written

# FORM OF CONTRIBUTION default code, used when the source cell is blank.
#   1 = Check   2 = Cash   3 = Credit Card   4 = Electronic / Electronic Transfer
# 4 is the default for ActBlue / ACH gifts.
# VERIFY the legend via CFOFS Data Download of a prior filed report before filing.
form_of_contribution_code: "4"
