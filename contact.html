<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Ohio Pride</title>
    <meta
      name="description"
      content="Get in touch with Ohio Pride. Have questions? Want to volunteer? We'd love to hear from you."
    />
    <link rel="canonical" href="https://www.ohiopride.org/contact" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contact | Ohio Pride" />
    <meta property="og:description" content="Get in touch with Ohio Pride. Have questions? Want to volunteer? We'd love to hear from you." />
    <meta property="og:url" content="https://www.ohiopride.org/contact" />
    <meta property="og:site_name" content="Ohio Pride" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Contact | Ohio Pride" />
    <meta name="twitter:description" content="Get in touch with Ohio Pride. Have questions? Want to volunteer? We'd love to hear from you." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      body {
        background: var(--dark-bg);
      }

      /* Two-column layout */
      .contact-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
        margin-top: 2rem;
      }

      /* Form styles */
      .contact-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .contact-form .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .contact-form label {
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-white);
      }
      .contact-form input,
      .contact-form select,
      .contact-form textarea {
        padding: 0.75rem;
        background-color: var(--dark-bg-light);
        border: 1px solid var(--dark-bg-lighter);
        color: var(--text-white);
        font-family: "Roboto Slab", serif;
        font-size: 1rem;
        border-radius: 6px;
        transition: border-color 0.2s;
      }
      .contact-form input:focus,
      .contact-form select:focus,
      .contact-form textarea:focus {
        outline: none;
        border-color: var(--color-blue);
      }
      .contact-form textarea {
        min-height: 150px;
        resize: vertical;
      }

      /* Contact info card */
      .contact-info-card {
        background-color: var(--dark-bg-light);
        border: 1px solid var(--dark-bg-lighter);
        padding: 2rem;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        height: fit-content;
      }
      .info-section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .info-section h3 {
        font-family: "Montserrat", sans-serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-light);
        font-weight: 700;
      }
      .info-section p,
      .info-section a {
        font-family: "Roboto Slab", serif;
        color: var(--text-white);
        font-size: 1rem;
        text-decoration: none;
        transition: color 0.2s;
      }
      .info-section a:hover {
        color: var(--color-light-blue);
      }
      .social-links {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
      }
      .social-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background-color: var(--dark-bg-lighter);
        border-radius: 6px;
        color: var(--text-white);
        text-decoration: none;
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 0.85rem;
        transition: background-color 0.2s;
      }
      .social-links a:hover {
        background-color: var(--color-blue);
      }

      @media (max-width: 768px) {
        .contact-wrapper {
          grid-template-columns: 1fr;
          gap: 2rem;
        }
        .contact-info-card {
          height: auto;
        }
      }
    </style>
  <link rel="stylesheet" href="/css/site-template.css">
  </head>
  <body>
<div id="site-header"></div>

    <!-- Hero -->
    <header class="contact-hero">
      <div class="container">
        <h1 class="section-title">Get in Touch</h1>
        <p class="subpage-hero-sub">
          Have questions? Want to volunteer? We'd love to hear from you.
        </p>
      </div>
    </header>

    <!-- Contact Section -->
    <section class="section">
      <div class="container">
        <div class="contact-wrapper">
          <!-- Contact Form -->
          <form
            class="contact-form"
            id="contactForm"
            name="contact"
            method="POST"
            data-netlify="true"
          >
            <input type="hidden" name="form-name" value="contact" />

            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" name="fullName" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="phone">Phone (Optional)</label>
              <input type="tel" id="phone" name="phone" />
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <select id="subject" name="subject" required>
                <option value="">Select a subject</option>
                <option value="general">General Inquiry</option>
                <option value="volunteering">Volunteering</option>
                <option value="founding-membership">Founding Membership</option>
                <option value="legislative">Legislative Issues</option>
                <option value="endorsements">Endorsements</option>
                <option value="media">Media/Press</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Send Message
            </button>
          </form>

          <!-- Contact Info -->
          <aside class="contact-info-card">
            <div class="info-section">
              <h3>Email</h3>
              <a href="mailto:info@ohiopride.org">info@ohiopride.org</a>
            </div>

            <div class="info-section">
              <h3>Location</h3>
              <p>Columbus, Ohio</p>
            </div>

            <div class="info-section">
              <h3>Follow Us</h3>
              <div class="social-links">
                <a
                  href="https://twitter.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Twitter/X"
                  >X</a
                >
                <a
                  href="https://instagram.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Instagram"
                  >IG</a
                >
                <a
                  href="https://facebook.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Facebook"
                  >FB</a
                >
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>

<div id="site-footer"></div>

    <a href="/donate" class="mobile-donate-fab">Donate</a>
    <script src="/js/main.js" defer></script>
    <script src="/js/enhancements.js" defer></script>
    <script src="/js/site-template.js" defer></script>
  </body>
</html>
