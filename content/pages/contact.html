<!-- Hero -->
    <header class="contact-hero">
      <div class="container">
        <h1 class="section-title">Get in Touch</h1>
        <p class="subpage-hero-sub">
          Have questions? Want to volunteer? We'd love to hear from you.
        </p>
      </div>
    </header>

    <!-- Contact Section -->
    <section class="section">
      <div class="container">
        <div class="contact-wrapper">
          <!-- Contact Form -->
          <form
            class="contact-form"
            id="contactForm"
            name="contact"
            method="POST"
            action="/api/contact"
          >
            <p class="hidden" style="display:none;">
              <label>Don't fill this out: <input name="bot-field" /></label>
            </p>

            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" name="fullName" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="phone">Phone (Optional)</label>
              <input type="tel" id="phone" name="phone" />
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <select id="subject" name="subject" required>
                <option value="">Select a subject</option>
                <option value="general">General Inquiry</option>
                <option value="volunteering">Volunteering</option>
                <option value="founding-membership">Founding Membership</option>
                <option value="legislative">Legislative Issues</option>
                <option value="endorsements">Endorsements</option>
                <option value="media">Media/Press</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Send Message
            </button>
          </form>

          <!-- Contact Info -->
          <aside class="contact-info-card">
            <div class="info-section">
              <h3>Email</h3>
              <a href="mailto:info@ohiopride.org">info@ohiopride.org</a>
            </div>

            <div class="info-section">
              <h3>Location</h3>
              <p>Cincinnati &amp; Dayton, Ohio</p>
            </div>

            <div class="info-section">
              <h3>Follow Us</h3>
              <div class="social-links">
                <a
                  href="https://twitter.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Twitter/X"
                  >X</a
                >
                <a
                  href="https://instagram.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Instagram"
                  >IG</a
                >
                <a
                  href="https://facebook.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Facebook"
                  >FB</a
                >
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>



    <a href="/donate" class="mobile-donate-fab">Donate</a>
